<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS-2 — Hub de Navegacion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #111928; font-family: 'Inter', system-ui, sans-serif; color: #fff; min-height: 100vh; }
    </style>
</head>
<body class="p-8">

    <!-- ══════════════════════════════════════════════════════════════ -->
    <!--  NIVEL 1: HUB RAIZ (patron ModuleCard.js)                      -->
    <!--  Header + grid de cards con enlace = window.location.href      -->
    <!-- ══════════════════════════════════════════════════════════════ -->
    <div id="mainContainer" class="max-w-7xl mx-auto w-full flex flex-col gap-4">

        <!-- Header (replica ModuleCard.buildHeader) -->
        <div class="w-full px-1 py-2 flex items-start justify-between gap-4 flex-wrap">
            <div class="flex flex-col min-w-0">
                <h2 class="text-xl md:text-2xl font-semibold leading-tight text-white">POS-2 — Punto de Venta</h2>
                <p class="text-xs md:text-sm mt-1 text-[#9CA3AF]">Selecciona el modulo con el que quieres trabajar.</p>
            </div>
        </div>

        <!-- Grid de cards (replica ModuleCard.renderCards) -->
        <div class="w-full grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-3 gap-y-6 content-start auto-rows-min">

            <!-- VENTAS (Nivel 1 -> ventas-menu.html) -->
            <div class="module-card-item w-full h-[180px] bg-[#1F2A37] hover:bg-[#273343] rounded-2xl shadow-md p-4 flex flex-col cursor-pointer transition duration-300 hover:scale-[1.02]"
                 onclick="window.location.href='ventas-menu.html'">
                <div class="flex justify-between items-start">
                    <div class="w-12 h-12 rounded-xl flex items-center justify-center" style="background-color:#233876">
                        <i data-lucide="shopping-cart" class="w-6 h-6 text-white"></i>
                    </div>
                </div>
                <div class="mt-auto flex flex-col gap-1">
                    <h2 class="text-base md:text-lg font-semibold font-[Poppins] leading-tight text-white">Ventas</h2>
                    <p class="text-xs md:text-sm font-[Poppins] leading-snug line-clamp-2 min-h-[2.5rem] text-[#9CA3AF]">Cobro, pedidos, historial y cierre de caja.</p>
                </div>
            </div>

            <!-- INVENTARIO (Nivel 1 -> inventario-menu.html) -->
            <div class="module-card-item w-full h-[180px] bg-[#1F2A37] hover:bg-[#273343] rounded-2xl shadow-md p-4 flex flex-col cursor-pointer transition duration-300 hover:scale-[1.02]"
                 onclick="window.location.href='inventario-menu.html'">
                <div class="flex justify-between items-start">
                    <div class="w-12 h-12 rounded-xl flex items-center justify-center" style="background-color:#233876">
                        <i data-lucide="package" class="w-6 h-6 text-white"></i>
                    </div>
                </div>
                <div class="mt-auto flex flex-col gap-1">
                    <h2 class="text-base md:text-lg font-semibold font-[Poppins] leading-tight text-white">Inventario</h2>
                    <p class="text-xs md:text-sm font-[Poppins] leading-snug line-clamp-2 min-h-[2.5rem] text-[#9CA3AF]">Stock, entradas, movimientos, mermas y traspasos.</p>
                </div>
            </div>

        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
