<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS-2 — Ventas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #111928; font-family: 'Inter', system-ui, sans-serif; color: #fff; min-height: 100vh; }
    </style>
</head>
<body class="p-8">

    <!-- ══════════════════════════════════════════════════════════════ -->
    <!--  NIVEL 2: VENTAS MENU (scaffold)                               -->
    <!--  Sub-hub: Cobrar (POS Main), Pedidos / Historial               -->
    <!-- ══════════════════════════════════════════════════════════════ -->
    <div id="mainContainer" class="max-w-7xl mx-auto w-full flex flex-col gap-4">

        <!-- Breadcrumb / back -->
        <div class="flex items-center gap-2 text-xs text-[#6B7280] mb-2">
            <a href="index.html" class="hover:text-[#7C3AED] transition-colors flex items-center gap-1">
                <i data-lucide="arrow-left" class="w-3 h-3"></i> POS-2
            </a>
            <span>/</span>
            <span class="text-white">Ventas</span>
        </div>

        <!-- Header -->
        <div class="w-full px-1 py-2 flex items-start justify-between gap-4 flex-wrap">
            <div class="flex flex-col min-w-0">
                <h2 class="text-xl md:text-2xl font-semibold leading-tight text-white">Ventas</h2>
                <p class="text-xs md:text-sm mt-1 text-[#9CA3AF]">Selecciona el submodulo de ventas.</p>
            </div>
        </div>

        <!-- Grid de submodulos -->
        <div class="w-full grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-3 gap-y-6 content-start auto-rows-min">

            <!-- Cobrar (POS Main) -->
            <div class="module-card-item w-full h-[180px] bg-[#1F2A37] hover:bg-[#273343] rounded-2xl shadow-md p-4 flex flex-col cursor-pointer transition duration-300 hover:scale-[1.02]"
                 onclick="window.location.href='pos-main.html'">
                <div class="flex justify-between items-start">
                    <div class="w-12 h-12 rounded-xl flex items-center justify-center" style="background-color:#233876">
                        <i data-lucide="shopping-cart" class="w-6 h-6 text-white"></i>
                    </div>
                </div>
                <div class="mt-auto flex flex-col gap-1">
                    <h2 class="text-base md:text-lg font-semibold font-[Poppins] leading-tight text-white">Cobrar (POS Main)</h2>
                    <p class="text-xs md:text-sm font-[Poppins] leading-snug line-clamp-2 min-h-[2.5rem] text-[#9CA3AF]">Pantalla principal de cobro con catalogo, carrito y metodos de pago.</p>
                </div>
            </div>

            <!-- Pedidos / Historial -->
            <div class="module-card-item w-full h-[180px] bg-[#1F2A37] hover:bg-[#273343] rounded-2xl shadow-md p-4 flex flex-col cursor-pointer transition duration-300 hover:scale-[1.02]"
                 onclick="window.location.href='pos-historial-ventas.html'">
                <div class="flex justify-between items-start">
                    <div class="w-12 h-12 rounded-xl flex items-center justify-center" style="background-color:#233876">
                        <i data-lucide="clipboard-list" class="w-6 h-6 text-white"></i>
                    </div>
                </div>
                <div class="mt-auto flex flex-col gap-1">
                    <h2 class="text-base md:text-lg font-semibold font-[Poppins] leading-tight text-white">Pedidos</h2>
                    <p class="text-xs md:text-sm font-[Poppins] leading-snug line-clamp-2 min-h-[2.5rem] text-[#9CA3AF]">Lista de ordenes programadas, cotizaciones y ventas con detalle lateral.</p>
                </div>
            </div>

        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
