<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplicar Descuento — Porcentaje</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f1723; font-family: 'Inter', system-ui, sans-serif; color: #fff; }
        .range-slider { -webkit-appearance: none; width: 100%; height: 6px; background: #1e293b; border-radius: 3px; outline: none; }
        .range-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: #7c3aed; border-radius: 50%; cursor: pointer; transition: all 0.15s; box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.2); }
        .range-slider::-webkit-slider-thumb:hover { transform: scale(1.1); box-shadow: 0 0 0 6px rgba(124, 58, 237, 0.3); }
        .range-slider::-moz-range-thumb { width: 20px; height: 20px; background: #7c3aed; border-radius: 50%; cursor: pointer; border: none; box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.2); }
        .percent-btn.active { background: #7c3aed; border-color: #7c3aed; color: #fff; }
        .percent-btn { transition: all 0.15s; }
        .percent-btn:hover { border-color: #7c3aed; background: rgba(124, 58, 237, 0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Modal de Descuento por Porcentaje -->
    <div class="w-full max-w-md">

        <!-- Header -->
        <div class="flex items-center gap-2 mb-4">
            <div class="w-10 h-10 rounded-xl bg-purple-600/20 border border-purple-500/30 flex items-center justify-center">
                <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
                </svg>
            </div>
            <div>
                <h2 class="text-lg font-bold text-white">Descuento por Porcentaje</h2>
                <p class="text-xs text-gray-400">Selecciona el porcentaje a aplicar</p>
            </div>
        </div>

        <!-- Card Principal -->
        <div class="bg-[#141d2b] border border-gray-800 rounded-2xl p-5 space-y-5">

            <!-- Resumen de la orden -->
            <div class="bg-[#1a2332] rounded-xl p-4 border border-gray-700">
                <div class="space-y-2">
                    <div class="flex justify-between text-xs">
                        <span class="text-gray-400">Subtotal</span>
                        <span class="text-white font-semibold" id="lblSubtotal">$2,500.00</span>
                    </div>
                    <div class="flex justify-between text-xs">
                        <span class="text-gray-400">Descuento</span>
                        <span class="text-orange-400 font-semibold" id="lblDescuento">-$0.00</span>
                    </div>
                    <div class="border-t border-gray-700 pt-2 flex justify-between">
                        <span class="text-sm font-bold text-white">Total a pagar</span>
                        <span class="text-lg font-extrabold text-green-400" id="lblTotal">$2,500.00</span>
                    </div>
                </div>
            </div>

            <!-- Slider de Porcentaje -->
            <div class="space-y-3">
                <div class="flex justify-between items-center">
                    <label class="text-sm font-semibold text-gray-300">Porcentaje de descuento</label>
                    <div class="px-3 py-1.5 bg-purple-600/20 border border-purple-500/30 rounded-lg">
                        <span class="text-lg font-bold text-purple-400" id="lblPorcentaje">0%</span>
                    </div>
                </div>

                <input type="range"
                       id="rangePorcentaje"
                       min="0"
                       max="50"
                       value="0"
                       class="range-slider"
                       oninput="actualizarPorcentaje(this.value)">

                <div class="flex justify-between text-[10px] text-gray-500 px-1">
                    <span>0%</span>
                    <span>10%</span>
                    <span>20%</span>
                    <span>30%</span>
                    <span>40%</span>
                    <span>50%</span>
                </div>
            </div>

            <!-- Botones de Porcentajes Predefinidos -->
            <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-400">Atajos rápidos</label>
                <div class="grid grid-cols-5 gap-2">
                    <button class="percent-btn py-2 px-3 rounded-lg text-xs font-bold border border-gray-700 bg-[#1a2332] text-gray-300" onclick="setPorcentaje(5)">5%</button>
                    <button class="percent-btn py-2 px-3 rounded-lg text-xs font-bold border border-gray-700 bg-[#1a2332] text-gray-300" onclick="setPorcentaje(10)">10%</button>
                    <button class="percent-btn py-2 px-3 rounded-lg text-xs font-bold border border-gray-700 bg-[#1a2332] text-gray-300" onclick="setPorcentaje(15)">15%</button>
                    <button class="percent-btn py-2 px-3 rounded-lg text-xs font-bold border border-gray-700 bg-[#1a2332] text-gray-300" onclick="setPorcentaje(20)">20%</button>
                    <button class="percent-btn py-2 px-3 rounded-lg text-xs font-bold border border-gray-700 bg-[#1a2332] text-gray-300" onclick="setPorcentaje(25)">25%</button>
                </div>
            </div>

            <!-- Input Manual de Porcentaje -->
            <div class="space-y-1">
                <label class="text-xs font-semibold text-gray-400">O ingresa un porcentaje personalizado</label>
                <div class="relative">
                    <input type="number"
                           id="inputPorcentaje"
                           min="0"
                           max="100"
                           step="0.5"
                           placeholder="0"
                           class="w-full bg-[#1a2332] border border-gray-700 rounded-lg py-2.5 pl-4 pr-8 text-sm text-white font-semibold focus:outline-none focus:border-purple-500"
                           oninput="setPorcentajeInput(this.value)">
                    <span class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 font-semibold">%</span>
                </div>
            </div>

            <!-- Ahorro -->
            <div class="bg-green-600/10 border border-green-500/30 rounded-xl p-3">
                <div class="flex items-center gap-2">
                    <svg class="w-4 h-4 text-green-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                    </svg>
                    <div>
                        <p class="text-[10px] text-green-400/80">Ahorro con este descuento</p>
                        <p class="text-sm font-bold text-green-400" id="lblAhorro">$0.00</p>
                    </div>
                </div>
            </div>

            <!-- Botones de Acción -->
            <div class="flex gap-2 pt-2">
                <button class="flex-1 py-2.5 px-4 rounded-lg text-sm font-bold bg-[#1a2332] border border-gray-700 text-gray-300 hover:bg-gray-700 hover:text-white transition-all" onclick="cancelar()">
                    Cancelar
                </button>
                <button class="flex-1 py-2.5 px-4 rounded-lg text-sm font-bold bg-gradient-to-r from-purple-600 to-violet-600 text-white shadow-lg shadow-purple-600/20 hover:from-purple-500 hover:to-violet-500 transition-all disabled:opacity-50 disabled:cursor-not-allowed" id="btnAplicar" disabled onclick="aplicarDescuento()">
                    Aplicar Descuento
                </button>
            </div>
        </div>

    </div>

    <script>
        // Configuración inicial
        let subtotal = 2500.00; // Este valor debe venir del backend
        let porcentajeActual = 0;
        let descuentoActual = 0;

        // Formateador de moneda
        function formatPrice(value) {
            return '$' + parseFloat(value || 0).toFixed(2);
        }

        // Actualizar desde slider
        function actualizarPorcentaje(valor) {
            porcentajeActual = parseFloat(valor) || 0;
            calcularDescuento();
            actualizarUI();
        }

        // Actualizar desde input manual
        function setPorcentajeInput(valor) {
            porcentajeActual = parseFloat(valor) || 0;
            document.getElementById('rangePorcentaje').value = Math.min(porcentajeActual, 50);
            calcularDescuento();
            actualizarUI();
        }

        // Actualizar desde botones rápidos
        function setPorcentaje(valor) {
            porcentajeActual = valor;
            document.getElementById('rangePorcentaje').value = valor;
            document.getElementById('inputPorcentaje').value = valor;
            calcularDescuento();
            actualizarUI();

            // Actualizar estado activo de botones
            document.querySelectorAll('.percent-btn').forEach(btn => {
                btn.classList.remove('active');
                if (parseInt(btn.textContent) === valor) {
                    btn.classList.add('active');
                }
            });
        }

        // Calcular descuento
        function calcularDescuento() {
            descuentoActual = subtotal * (porcentajeActual / 100);
        }

        // Actualizar interfaz
        function actualizarUI() {
            const total = subtotal - descuentoActual;

            document.getElementById('lblPorcentaje').textContent = porcentajeActual.toFixed(1) + '%';
            document.getElementById('lblDescuento').textContent = '-' + formatPrice(descuentoActual);
            document.getElementById('lblTotal').textContent = formatPrice(total);
            document.getElementById('lblAhorro').textContent = formatPrice(descuentoActual);

            // Habilitar/deshabilitar botón
            document.getElementById('btnAplicar').disabled = descuentoActual <= 0;
        }

        // Aplicar descuento
        function aplicarDescuento() {
            console.log('Aplicando descuento:', {
                porcentaje: porcentajeActual,
                monto: descuentoActual,
                total: subtotal - descuentoActual
            });
            // Aquí iría la lógica para cerrar el modal y aplicar
        }

        // Cancelar
        function cancelar() {
            console.log('Cancelando descuento');
        }

        // Inicializar
        actualizarUI();
    </script>
</body>
</html>
