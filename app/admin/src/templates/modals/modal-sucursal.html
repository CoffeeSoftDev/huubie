<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Sucursal - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .input-modal {
            background: #1a2332;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 12px;
            color: #d1d5db;
            width: 100%;
            transition: border-color .15s;
        }
        .input-modal:focus { outline: none; border-color: #7c3aed; }
        .input-modal::placeholder { color: #6b7280; }
    </style>
</head>
<body class="bg-[#111928] text-white min-h-screen flex items-center justify-center p-6">
    <!-- Backdrop simulado para demo -->
    <div class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-[#1F2A37] border border-gray-700 rounded-xl w-full max-w-[400px] mx-4 shadow-2xl">
            <!-- Header -->
            <div class="flex items-center justify-between px-5 py-4 border-b border-gray-800">
                <h3 class="text-sm font-bold flex items-center gap-2">
                    <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    Nueva Sucursal
                </h3>
                <button onclick="window.close()" class="w-8 h-8 rounded-lg hover:bg-[#1a2332] flex items-center justify-center text-gray-400 hover:text-white transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>

            <!-- Body -->
            <div class="p-5 space-y-4">
                <div class="space-y-1">
                    <label class="text-[11px] text-gray-500 uppercase tracking-wider">Nombre de la sucursal</label>
                    <input type="text" class="input-modal" placeholder="Ej. Sucursal Centro">
                </div>
                <div class="space-y-1">
                    <label class="text-[11px] text-gray-500 uppercase tracking-wider">Ubicacion / Direccion</label>
                    <textarea rows="3" class="input-modal resize-none" placeholder="Ej. Av. Principal 123, Col. Centro, CP 01000, Ciudad de Mexico"></textarea>
                </div>
            </div>

            <!-- Footer -->
            <div class="flex items-center justify-end gap-2 px-5 py-4 border-t border-gray-800">
                <button onclick="window.close()" class="px-4 py-2 rounded-lg text-xs font-medium text-gray-400 hover:text-white hover:bg-[#1a2332] transition-colors">Cancelar</button>
                <button class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium px-4 py-2 rounded-lg transition-colors flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                    Guardar
                </button>
            </div>
        </div>
    </div>
</body>
</html>
