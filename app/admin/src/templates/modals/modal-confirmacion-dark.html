<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal — Confirmación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-black/60 min-h-screen flex items-center justify-center p-4">

    <!-- Modal Card -->
    <div class="w-full max-w-[400px] bg-[#1F2A37] border border-gray-700 rounded-xl shadow-2xl p-6 text-center">
        <div class="w-12 h-12 rounded-full bg-red-500/15 border border-red-500/30 flex items-center justify-center mx-auto mb-4">
            <svg class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
        </div>
        <h3 class="text-base font-bold mb-1">¿Deseas desactivar a Ana López?</h3>
        <p class="text-xs text-gray-400 mb-6">El usuario perderá acceso inmediato al sistema. Puedes reactivarlo después.</p>

        <div class="flex items-center justify-center gap-3">
            <button class="px-4 py-2 rounded-lg text-xs font-medium text-gray-300 hover:text-white hover:bg-[#1a2332] border border-gray-700 transition-colors">Cancelar</button>
            <button class="px-4 py-2 rounded-lg text-xs font-medium bg-red-600 hover:bg-red-700 text-white transition-colors">Sí, desactivar</button>
        </div>
    </div>

</body>
</html>
