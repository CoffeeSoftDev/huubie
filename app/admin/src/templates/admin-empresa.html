<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Empresa - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .input-modal {
            background: #1a2332;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 12px;
            color: #d1d5db;
            width: 100%;
            transition: border-color .15s;
        }
        .input-modal:focus {
            outline: none;
            border-color: #7c3aed;
        }
        .input-modal::placeholder { color: #6b7280; }
        .card-demo {
            background: #1F2A37;
            border: 1px solid rgba(55,65,81,.6);
            border-radius: 12px;
            transition: .15s;
        }
    </style>
</head>
<body class="bg-[#111928] text-white min-h-screen">
    <!-- Sidebar -->
    <div class="fixed left-0 top-0 h-full w-56 bg-[#0f172a] border-r border-gray-800 flex flex-col z-20">
        <div class="h-16 flex items-center px-4 border-b border-gray-800">
            <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center mr-3">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v18m-6-6h12m-6-6h12"/></svg>
            </div>
            <span class="font-bold text-sm">CoffeeSoft</span>
        </div>
        <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
            <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-gray-400 hover:bg-[#1a2332] hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                Dashboard
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-gray-400 hover:bg-[#1a2332] hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                Reportes
            </a>
            <a href="admin-index.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm bg-[#1a2332] text-white border-l-2 border-blue-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                Configuracion
            </a>
        </nav>
        <div class="p-3 border-t border-gray-800">
            <div class="flex items-center gap-3 px-3 py-2">
                <div class="w-8 h-8 rounded-full bg-purple-600 flex items-center justify-center text-xs font-bold">JD</div>
                <div class="text-xs">
                    <div class="font-medium text-white">John Doe</div>
                    <div class="text-gray-500">Admin</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Header -->
    <div class="fixed top-0 left-56 right-0 h-16 bg-[#141d2b] border-b border-gray-800 flex items-center justify-between px-6 z-10">
        <div class="flex items-center gap-3">
            <a href="admin-index.html" class="text-gray-400 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
            </a>
            <h1 class="text-lg font-bold flex items-center gap-2">
                <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                Perfil de Empresa
            </h1>
        </div>
        <span class="text-xs text-gray-400">Admin / Configuracion / Empresa</span>
    </div>

    <!-- Main Content -->
    <div class="ml-56 pt-16 min-h-screen p-6">
        <div class="max-w-5xl mx-auto">
            <div class="card-demo p-6">
                <!-- Card Header -->
                <div class="flex items-center gap-3 mb-6 pb-4 border-b border-gray-700">
                    <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                    <div>
                        <h2 class="text-sm font-bold">Perfil de Empresa</h2>
                        <p class="text-[11px] text-gray-400">Actualiza los datos generales y el logo de tu empresa.</p>
                    </div>
                </div>

                <div class="flex flex-col lg:flex-row gap-8">
                    <!-- Logo Section -->
                    <div class="flex-shrink-0 flex flex-col items-center gap-4">
                        <div class="relative w-48 h-48 rounded-full border-2 border-gray-700 overflow-hidden bg-[#1a2332] flex items-center justify-center">
                            <img src="https://via.placeholder.com/192/1a2332/6b7280?text=Logo" alt="Logo Empresa" class="w-full h-full object-cover">
                            <!-- Overlay -->
                            <div class="absolute inset-0 bg-black/50 opacity-0 hover:opacity-100 transition-opacity flex items-center justify-center gap-2">
                                <button class="w-9 h-9 rounded-lg bg-blue-600 hover:bg-blue-700 flex items-center justify-center text-white" title="Cambiar logo">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                                </button>
                                <button class="w-9 h-9 rounded-lg bg-red-600 hover:bg-red-700 flex items-center justify-center text-white" title="Eliminar logo">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                </button>
                            </div>
                        </div>
                        <span class="text-[11px] text-gray-500">192 x 192 px recomendado</span>
                    </div>

                    <!-- Form Section -->
                    <div class="flex-1">
                        <form onsubmit="return false;" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="space-y-1">
                                <label class="text-[11px] text-gray-500 uppercase tracking-wider">Nombre / Razon Social</label>
                                <input type="text" value="CoffeeSoft S.A. de C.V." class="input-modal" placeholder="Ej. Mi Empresa S.A. de C.V.">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[11px] text-gray-500 uppercase tracking-wider">RFC</label>
                                <input type="text" value="CSF123456ABC" class="input-modal" placeholder="Ej. ABCD010101ABC">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[11px] text-gray-500 uppercase tracking-wider">Ubicacion</label>
                                <input type="text" value="Ciudad de Mexico" class="input-modal" placeholder="Ej. Ciudad de Mexico">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[11px] text-gray-500 uppercase tracking-wider">Telefono</label>
                                <input type="text" value="55 1234 5678" class="input-modal" placeholder="Ej. 55 1234 5678">
                            </div>
                            <div class="space-y-1 md:col-span-2">
                                <label class="text-[11px] text-gray-500 uppercase tracking-wider">Direccion</label>
                                <textarea rows="3" class="input-modal resize-none" placeholder="Ej. Av. Principal 123, Col. Centro, CP 01000">Av. Insurgentes Sur 1234, Piso 5, Col. Del Valle, CP 03100, CDMX</textarea>
                            </div>
                        </form>

                        <div class="mt-6 flex justify-end">
                            <button class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium px-5 py-2.5 rounded-lg transition-colors flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                                Guardar cambios
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
