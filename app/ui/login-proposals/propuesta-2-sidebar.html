<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Huubie Coffee — Propuesta 2: Panel Ilustrado</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/ui-kit.css">
  <style>
    body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }

    /* Paleta exacta de coffee/src/css/colors.css */
    :root {
      --primarydark : #111928;
      --secondaryDark: #1F2A37;
      --primary     : rgb(28, 100, 242);
      --primary1    : rgba(61, 36, 116, 0.1);
      --primary2    : rgba(61, 36, 116, 0.2);
      --secondary   : rgba(113, 82, 236);
      --secondary1  : rgba(113, 82, 236, 0.1);
      --info        : rgba(118, 169, 250);
      --success     : rgb(63, 193, 137);
      --danger      : rgb(234, 2, 52);
      --warning     : #E74041;
      --gray        : #374151;
      --light       : #CED2D8;
      --aliceblue   : #e3ebf6;
    }

    .gradient-sidebar {
      background: linear-gradient(145deg, var(--primarydark) 0%, #141d2b 40%, var(--secondaryDark) 100%);
    }

    .blob-1 {
      position: absolute; width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(28,100,242,0.12) 0%, transparent 70%);
      top: -80px; left: -80px; border-radius: 50%; pointer-events: none;
    }
    .blob-2 {
      position: absolute; width: 240px; height: 240px;
      background: radial-gradient(circle, rgba(113,82,236,0.10) 0%, transparent 70%);
      bottom: -60px; right: -60px; border-radius: 50%; pointer-events: none;
    }

    .link-forgot {
      color: var(--primary);
      transition: color 0.15s ease;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .link-forgot:hover { color: var(--info); }
  </style>
</head>
<body class="min-h-screen flex flex-col md:flex-row" style="background-color: var(--primarydark);">

  <!-- Panel izquierdo: ilustracion + mensaje -->
  <div class="hidden md:flex md:w-1/2 gradient-sidebar relative items-center justify-center p-12 overflow-hidden"
       style="border-right: 1px solid #1a2332;">
    <div class="blob-1"></div>
    <div class="blob-2"></div>

    <div class="relative z-10 max-w-md text-center">
      <div class="w-64 h-64 flex items-center justify-center mx-auto mb-8">
        <img src="../../src/img/logo/huubie.svg" alt="Huubie" class="w-full h-full object-contain drop-shadow-2xl">
      </div>
      <h2 class="text-2xl font-bold text-white mb-3">Huubie Coffee</h2>
      <p class="text-sm leading-relaxed" style="color: #9CA3AF;">
        Plataforma integral para la gestión de cafeterías, restaurantes y puntos de venta. Control total de tu negocio.
      </p>
    </div>
  </div>

  <!-- Panel derecho: formulario -->
  <div class="flex-1 flex flex-col items-center justify-center px-6 py-10 md:px-16 md:py-0">
    <div class="w-full max-w-[400px]">

      <!-- Header mobile -->
      <div class="md:hidden flex flex-col items-center mb-8">
        <div class="w-36 h-36 flex items-center justify-center mb-4">
          <img src="../../src/img/logo/huubie.svg" alt="Huubie" class="w-full h-full object-contain drop-shadow-lg">
        </div>
        <h1 class="text-lg font-bold text-white">Huubie Coffee</h1>
      </div>

      <div class="mb-8">
        <h2 class="text-xl font-bold text-white">Inicia sesión</h2>
        <p class="text-sm mt-1" style="color: #9CA3AF;">Ingresa tus credenciales para continuar</p>
      </div>

      <form class="space-y-5">
        <div>
          <label class="block text-[11px] font-medium uppercase tracking-wider mb-1.5"
                 style="color: #9CA3AF;">Usuario</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center" style="color: var(--gray);">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
            </span>
            <input type="text" class="cs-input pl-10" placeholder="ej. luis.garcia" required>
          </div>
        </div>

        <div>
          <label class="block text-[11px] font-medium uppercase tracking-wider mb-1.5"
                 style="color: #9CA3AF;">Contraseña</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center" style="color: var(--gray);">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
              </svg>
            </span>
            <input type="password" class="cs-input pl-10 pr-10" placeholder="••••••••" required>
            <button type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center transition"
                    style="color: var(--gray);" onmouseenter="this.style.color='#9CA3AF'" onmouseleave="this.style.color='var(--gray)'">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="flex items-center justify-end text-sm">
          <a href="#" class="link-forgot">¿Olvidaste la contraseña?</a>
        </div>

        <button type="submit" class="cs-btn cs-btn-primary w-full py-2.5" style="background-color: var(--primary); border-color: var(--primary);">
          Iniciar sesión
        </button>
      </form>

      <p class="text-center text-[11px] mt-8" style="color: #6B7280;">
        Huubie Coffee v1.0
      </p>
    </div>
  </div>

</body>
</html>
