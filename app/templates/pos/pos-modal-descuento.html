<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Descuento — POS Huubie</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../../ui/css/ui-kit.css">
  <style> body { font-family: 'Inter', system-ui, sans-serif; } </style>
</head>
<body class="bg-[#111928] text-white min-h-screen flex items-center justify-center p-4">

  <!-- Modal Backdrop (visible for demo) -->
  <div class="cs-modal-backdrop"></div>

  <div class="cs-modal" style="max-width: 480px; width: 100%;">
    <div class="cs-modal-header">
      <h3 class="cs-modal-title">Aplicar descuento</h3>
      <button class="text-gray-400 hover:text-white">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="cs-modal-body">

      <!-- Current total reference -->
      <div class="bg-[#1a2332] rounded-lg p-3 border border-gray-700 mb-4 text-center">
        <p class="text-[11px] uppercase tracking-wider text-gray-500 mb-1">Total actual</p>
        <p id="posCurrentTotal" class="text-2xl font-bold text-white">$565.00</p>
      </div>

      <!-- Tabs -->
      <div class="cs-tabs mb-4">
        <button class="cs-tab cs-tab-active">Monto fijo</button>
        <button class="cs-tab">Porcentaje</span></button>
      </div>

      <!-- Discount input -->
      <div class="mb-4">
        <label class="block text-[11px] font-medium uppercase tracking-wider text-gray-500 mb-1">Descuento</label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">$</span>
          <input id="posDiscountInput" type="number" step="0.01" value="50.00" class="cs-input w-full pl-8 text-right font-semibold">
        </div>
      </div>

      <!-- Reason -->
      <div class="mb-4">
        <label class="block text-[11px] font-medium uppercase tracking-wider text-gray-500 mb-1">Motivo</label>
        <input id="posDiscountReason" type="text" class="cs-input w-full" placeholder="Ej. Cliente frecuente, promoción...">
      </div>

      <!-- Preview -->
      <div class="bg-[#1a2332] rounded-lg p-3 border border-gray-700">
        <div class="flex justify-between text-sm mb-1">
          <span class="text-gray-400">Descuento aplicado</span>
          <span id="posDiscountPreview" class="text-[#fbbf24] font-medium">−$50.00</span>
        </div>
        <div class="flex justify-between text-base font-semibold pt-2 border-t border-gray-700">
          <span class="text-white">Nuevo total</span>
          <span id="posNewTotalPreview" class="text-[#3FC189]">$515.00</span>
        </div>
      </div>

    </div>

    <div class="cs-modal-footer">
      <button class="cs-btn cs-btn-outline">Cancelar</button>
      <button class="cs-btn cs-btn-primary">Aplicar</button>
    </div>
  </div>

</body>
</html>
