<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal de Cobro — POS Huubie</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../../ui/css/ui-kit.css">
  <style> body { font-family: 'Inter', system-ui, sans-serif; } </style>
</head>
<body class="bg-[#111928] text-white min-h-screen flex items-center justify-center p-4">

  <!-- Modal Backdrop (visible for demo) -->
  <div class="cs-modal-backdrop"></div>

  <div class="cs-modal" style="max-width: 520px; width: 100%;">
    <div class="cs-modal-header">
      <h3 class="cs-modal-title">Cobrar orden #1042</h3>
      <button class="text-gray-400 hover:text-white">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="cs-modal-body">

      <!-- Summary -->
      <div class="bg-[#1a2332] rounded-lg p-4 border border-gray-700 mb-4">
        <div class="flex justify-between text-sm mb-1">
          <span class="text-gray-400">Total orden</span>
          <span class="text-white font-medium">$565.00</span>
        </div>
        <div class="flex justify-between text-sm mb-1">
          <span class="text-gray-400">Pagos previos</span>
          <span class="text-white font-medium">$0.00</span>
        </div>
        <div class="flex justify-between text-base font-semibold pt-2 border-t border-gray-700">
          <span class="text-white">Saldo pendiente</span>
          <span class="text-[#3FC189]">$565.00</span>
        </div>
      </div>

      <!-- Toggle Abono / Total -->
      <div class="flex items-center justify-between mb-4">
        <span class="text-sm text-gray-300">Dejar abono</span>
        <div class="cs-toggle" onclick="this.querySelector('.cs-toggle-track').classList.toggle('active')">
          <div class="cs-toggle-track"><div class="cs-toggle-knob"></div></div>
        </div>
      </div>

      <!-- Tabs Monto / Porcentaje -->
      <div class="cs-tabs mb-4">
        <button class="cs-tab cs-tab-active">Monto fijo</button>
        <button class="cs-tab">Porcentaje</button>
      </div>

      <!-- Método de pago -->
      <p class="text-[11px] uppercase tracking-wider text-gray-500 mb-2">Método de pago</p>
      <div class="grid grid-cols-3 gap-2 mb-4">
        <button id="payMethodCash" class="flex flex-col items-center gap-2 p-3 rounded-lg border border-gray-700 bg-[#1a2332] hover:border-[#7C3AED] transition cs-tab-active">
          <span class="text-2xl">💵</span>
          <span class="text-xs text-gray-300">Efectivo</span>
        </button>
        <button id="payMethodCard" class="flex flex-col items-center gap-2 p-3 rounded-lg border border-gray-700 bg-[#1a2332] hover:border-[#7C3AED] transition">
          <span class="text-2xl">💳</span>
          <span class="text-xs text-gray-300">Tarjeta</span>
        </button>
        <button id="payMethodTransfer" class="flex flex-col items-center gap-2 p-3 rounded-lg border border-gray-700 bg-[#1a2332] hover:border-[#7C3AED] transition">
          <span class="text-2xl">🏦</span>
          <span class="text-xs text-gray-300">Transferencia</span>
        </button>
      </div>

      <!-- Monto recibido + Cambio -->
      <div class="grid grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-[11px] font-medium uppercase tracking-wider text-gray-500 mb-1">Monto recibido</label>
          <input id="posReceivedAmount" type="number" step="0.01" value="600.00" class="cs-input w-full text-right font-semibold">
        </div>
        <div>
          <label class="block text-[11px] font-medium uppercase tracking-wider text-gray-500 mb-1">Cambio</label>
          <input id="posChangeAmount" type="text" readonly value="$35.00" class="cs-input w-full text-right font-semibold text-[#3FC189]">
        </div>
      </div>

      <!-- Alerta si no hay abono -->
      <div class="cs-callout cs-callout-info">
        <strong class="block text-sm mb-1">Sin abono registrado</strong>
        <p class="text-sm text-gray-400">Se guardará como cotización hasta registrar un pago.</p>
      </div>

    </div>

    <div class="cs-modal-footer">
      <button class="cs-btn cs-btn-outline">Cancelar</button>
      <button class="cs-btn cs-btn-primary">Confirmar pago</button>
    </div>
  </div>

</body>
</html>
