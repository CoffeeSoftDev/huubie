<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propuesta B — Tarjetas Verticales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111928; font-family: 'Inter', system-ui, sans-serif; color: #fff; height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .method-card { transition: all 0.15s; }
        .method-card.active { border-color: #1C64F2; background: rgba(28,100,242,0.08); }
        .method-card .check-indicator { opacity: 0; transition: opacity 0.15s; }
        .method-card.active .check-indicator { opacity: 1; }
    </style>
</head>
<body>

    <!-- Modal -->
    <div class="w-full max-w-[420px] bg-[#1F2A37] rounded-2xl border border-[#374151] shadow-2xl overflow-hidden">

        <!-- Header -->
        <div class="flex items-center justify-between px-5 py-4 border-b border-[#374151]">
            <div>
                <h3 class="text-sm font-bold text-white">Cobrar Venta #1043</h3>
                <p class="text-[10px] text-[#9CA3AF] mt-0.5">Total a pagar: <span class="text-[#3FC189] font-semibold">$2,626.75</span></p>
            </div>
            <button class="text-[#9CA3AF] hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>

        <!-- Body -->
        <div class="px-5 py-4 space-y-3">

            <!-- Cards de método -->

            <!-- Efectivo (activo con monto) -->
            <div class="method-card active rounded-xl border border-[#374151] bg-[#1a2332] p-3.5 relative">
                <div class="check-indicator absolute top-3 right-3 w-5 h-5 rounded-full bg-[#1C64F2] flex items-center justify-center">
                    <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                </div>
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-10 h-10 rounded-lg bg-[rgba(63,193,137,0.15)] border border-[rgba(63,193,137,0.3)] flex items-center justify-center">
                        <span class="text-xl">💵</span>
                    </div>
                    <div>
                        <p class="text-sm font-bold text-white">Efectivo</p>
                        <p class="text-[10px] text-[#9CA3AF]">Pago en efectivo</p>
                    </div>
                </div>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-[#6B7280] text-sm font-bold">$</span>
                    <input type="number" value="300" class="w-full bg-[#141d2b] border border-[#374151] rounded-lg pl-7 pr-3 py-2 text-sm text-white text-right font-bold focus:outline-none focus:border-[#1C64F2]">
                </div>
            </div>

            <!-- Tarjeta (activo con monto) -->
            <div class="method-card active rounded-xl border border-[#374151] bg-[#1a2332] p-3.5 relative">
                <div class="check-indicator absolute top-3 right-3 w-5 h-5 rounded-full bg-[#1C64F2] flex items-center justify-center">
                    <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                </div>
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-10 h-10 rounded-lg bg-[rgba(28,100,242,0.15)] border border-[rgba(28,100,242,0.3)] flex items-center justify-center">
                        <span class="text-xl">💳</span>
                    </div>
                    <div>
                        <p class="text-sm font-bold text-white">Tarjeta</p>
                        <p class="text-[10px] text-[#9CA3AF]">Débito o crédito</p>
                    </div>
                </div>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-[#6B7280] text-sm font-bold">$</span>
                    <input type="number" value="200" class="w-full bg-[#141d2b] border border-[#374151] rounded-lg pl-7 pr-3 py-2 text-sm text-white text-right font-bold focus:outline-none focus:border-[#1C64F2]">
                </div>
            </div>

            <!-- Transferencia (activo con monto) -->
            <div class="method-card active rounded-xl border border-[#374151] bg-[#1a2332] p-3.5 relative">
                <div class="check-indicator absolute top-3 right-3 w-5 h-5 rounded-full bg-[#1C64F2] flex items-center justify-center">
                    <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                </div>
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-10 h-10 rounded-lg bg-[rgba(124,58,237,0.15)] border border-[rgba(124,58,237,0.3)] flex items-center justify-center">
                        <span class="text-xl">🏦</span>
                    </div>
                    <div>
                        <p class="text-sm font-bold text-white">Transferencia</p>
                        <p class="text-[10px] text-[#9CA3AF]">SPEI o transferencia</p>
                    </div>
                </div>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-[#6B7280] text-sm font-bold">$</span>
                    <input type="number" value="300" class="w-full bg-[#141d2b] border border-[#374151] rounded-lg pl-7 pr-3 py-2 text-sm text-white text-right font-bold focus:outline-none focus:border-[#1C64F2]">
                </div>
            </div>

            <!-- Total resumen -->
            <div class="bg-[#1a2332] rounded-lg p-3.5 border border-[#374151] mt-2">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs text-[#9CA3AF]">Total pagado</span>
                    <span class="text-sm font-bold text-white">$800.00</span>
                </div>
                <div class="h-1.5 bg-[#374151] rounded-full overflow-hidden">
                    <div class="h-full bg-[#3FC189] rounded-full" style="width: 30%"></div>
                </div>
                <p class="text-[10px] text-[#EA0234] mt-1.5 font-semibold">Pendiente: $1,826.75</p>
            </div>
        </div>

        <!-- Footer -->
        <div class="flex items-center justify-end gap-2 px-5 py-3 border-t border-[#374151] bg-[#141d2b]">
            <button class="px-4 py-2 rounded-lg text-xs font-semibold text-[#9CA3AF] hover:text-white hover:bg-[#374151] transition-colors">Cancelar</button>
            <button class="px-5 py-2 rounded-lg text-xs font-bold bg-[#3FC189] text-white hover:bg-[#35a876] active:scale-95 transition-all">Confirmar Pago</button>
        </div>
    </div>

    <div class="fixed bottom-4 right-4 bg-[#1F2A37] border border-[#374151] rounded-lg px-4 py-2 text-xs text-[#9CA3AF]">
        Propuesta B — Tarjetas Verticales
    </div>

</body>
</html>
