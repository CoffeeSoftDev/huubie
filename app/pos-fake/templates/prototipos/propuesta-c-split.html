<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propuesta C — Split Visual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111928; font-family: 'Inter', system-ui, sans-serif; color: #fff; height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .donut-ring { transition: stroke-dasharray 0.3s ease; }
        .pay-chip { transition: all 0.15s; cursor: pointer; }
        .pay-chip:hover { background: rgba(124,58,237,0.1); border-color: #7C3AED; }
        .pay-chip.active { background: rgba(28,100,242,0.15); border-color: #1C64F2; }
    </style>
</head>
<body>

    <!-- Modal -->
    <div class="w-full max-w-[460px] bg-[#1F2A37] rounded-2xl border border-[#374151] shadow-2xl overflow-hidden">

        <!-- Header -->
        <div class="flex items-center justify-between px-5 py-4 border-b border-[#374151]">
            <div>
                <h3 class="text-sm font-bold text-white">Cobrar Venta #1043</h3>
                <p class="text-[10px] text-[#9CA3AF] mt-0.5">Total a pagar: <span class="text-[#3FC189] font-semibold">$2,626.75</span></p>
            </div>
            <button class="text-[#9CA3AF] hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>

        <!-- Body -->
        <div class="px-5 py-4 space-y-4">

            <!-- Visualización donut + totales -->
            <div class="flex items-center gap-4">
                <!-- Donut mini -->
                <div class="relative w-20 h-20 flex-shrink-0">
                    <svg class="w-20 h-20 transform -rotate-90" viewBox="0 0 36 36">
                        <circle cx="18" cy="18" r="15.915" fill="none" stroke="#374151" stroke-width="4"/>
                        <circle cx="18" cy="18" r="15.915" fill="none" stroke="#3FC189" stroke-width="4" stroke-dasharray="30 70" stroke-linecap="round"/>
                        <circle cx="18" cy="18" r="15.915" fill="none" stroke="#1C64F2" stroke-width="4" stroke-dasharray="20 80" stroke-dashoffset="-30" stroke-linecap="round"/>
                        <circle cx="18" cy="18" r="15.915" fill="none" stroke="#7C3AED" stroke-width="4" stroke-dasharray="12 88" stroke-dashoffset="-50" stroke-linecap="round"/>
                    </svg>
                    <div class="absolute inset-0 flex items-center justify-center">
                        <span class="text-[10px] font-bold text-white">30%</span>
                    </div>
                </div>

                <!-- Leyenda -->
                <div class="flex-1 space-y-1">
                    <div class="flex items-center justify-between text-xs">
                        <div class="flex items-center gap-1.5">
                            <span class="w-2 h-2 rounded-full bg-[#3FC189]"></span>
                            <span class="text-[#9CA3AF]">Efectivo</span>
                        </div>
                        <span class="text-white font-medium">$300.00</span>
                    </div>
                    <div class="flex items-center justify-between text-xs">
                        <div class="flex items-center gap-1.5">
                            <span class="w-2 h-2 rounded-full bg-[#1C64F2]"></span>
                            <span class="text-[#9CA3AF]">Tarjeta</span>
                        </div>
                        <span class="text-white font-medium">$200.00</span>
                    </div>
                    <div class="flex items-center justify-between text-xs">
                        <div class="flex items-center gap-1.5">
                            <span class="w-2 h-2 rounded-full bg-[#7C3AED]"></span>
                            <span class="text-[#9CA3AF]">Transferencia</span>
                        </div>
                        <span class="text-white font-medium">$300.00</span>
                    </div>
                    <div class="flex items-center justify-between text-xs pt-1 border-t border-[#374151]">
                        <div class="flex items-center gap-1.5">
                            <span class="w-2 h-2 rounded-full bg-[#374151]"></span>
                            <span class="text-[#EA0234]">Pendiente</span>
                        </div>
                        <span class="text-[#EA0234] font-bold">$1,826.75</span>
                    </div>
                </div>
            </div>

            <!-- Barra de progreso -->
            <div>
                <div class="flex justify-between text-[10px] mb-1.5">
                    <span class="text-[#9CA3AF]">Progreso del pago</span>
                    <span class="text-white font-bold">$800.00 / $2,626.75</span>
                </div>
                <div class="h-3 bg-[#374151] rounded-full overflow-hidden flex">
                    <div class="h-full bg-[#3FC189]" style="width: 38%"></div>
                    <div class="h-full bg-[#1C64F2]" style="width: 25%"></div>
                    <div class="h-full bg-[#7C3AED]" style="width: 12%"></div>
                </div>
            </div>

            <!-- Chips de pago -->
            <div class="space-y-2">
                <p class="text-[10px] uppercase tracking-wider text-[#6B7280] font-semibold">Distribuir pago</p>

                <!-- Efectivo -->
                <div class="pay-chip active flex items-center gap-3 p-3 rounded-xl border border-[#374151] bg-[#1a2332]">
                    <div class="w-9 h-9 rounded-lg bg-[rgba(63,193,137,0.15)] border border-[rgba(63,193,137,0.3)] flex items-center justify-center flex-shrink-0">
                        <span class="text-lg">💵</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-xs font-semibold text-white">Efectivo</p>
                    </div>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-[#6B7280] text-xs font-bold">$</span>
                        <input type="number" value="300" class="w-24 bg-[#141d2b] border border-[#374151] rounded-lg pl-6 pr-2 py-1.5 text-sm text-white text-right font-bold focus:outline-none focus:border-[#1C64F2]">
                    </div>
                </div>

                <!-- Tarjeta -->
                <div class="pay-chip active flex items-center gap-3 p-3 rounded-xl border border-[#374151] bg-[#1a2332]">
                    <div class="w-9 h-9 rounded-lg bg-[rgba(28,100,242,0.15)] border border-[rgba(28,100,242,0.3)] flex items-center justify-center flex-shrink-0">
                        <span class="text-lg">💳</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-xs font-semibold text-white">Tarjeta</p>
                    </div>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-[#6B7280] text-xs font-bold">$</span>
                        <input type="number" value="200" class="w-24 bg-[#141d2b] border border-[#374151] rounded-lg pl-6 pr-2 py-1.5 text-sm text-white text-right font-bold focus:outline-none focus:border-[#1C64F2]">
                    </div>
                </div>

                <!-- Transferencia -->
                <div class="pay-chip active flex items-center gap-3 p-3 rounded-xl border border-[#374151] bg-[#1a2332]">
                    <div class="w-9 h-9 rounded-lg bg-[rgba(124,58,237,0.15)] border border-[rgba(124,58,237,0.3)] flex items-center justify-center flex-shrink-0">
                        <span class="text-lg">🏦</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-xs font-semibold text-white">Transferencia</p>
                    </div>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-[#6B7280] text-xs font-bold">$</span>
                        <input type="number" value="300" class="w-24 bg-[#141d2b] border border-[#374151] rounded-lg pl-6 pr-2 py-1.5 text-sm text-white text-right font-bold focus:outline-none focus:border-[#1C64F2]">
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="flex items-center justify-end gap-2 px-5 py-3 border-t border-[#374151] bg-[#141d2b]">
            <button class="px-4 py-2 rounded-lg text-xs font-semibold text-[#9CA3AF] hover:text-white hover:bg-[#374151] transition-colors">Cancelar</button>
            <button class="px-5 py-2 rounded-lg text-xs font-bold bg-[#3FC189] text-white hover:bg-[#35a876] active:scale-95 transition-all">Confirmar Pago</button>
        </div>
    </div>

    <div class="fixed bottom-4 right-4 bg-[#1F2A37] border border-[#374151] rounded-lg px-4 py-2 text-xs text-[#9CA3AF]">
        Propuesta C — Split Visual con Donut y Barra
    </div>

</body>
</html>
