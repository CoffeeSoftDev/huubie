<!DOCTYPE html>

<body class="p-8">

    <div class="max-w-5xl mx-auto">

            <p class="text-sm text-[#9CA3AF]">Interfaz de cobro y gestion de pedidos basada en alpha/pedidos, estilizada con Huubie UI.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <a href="pos-main.html" class="group h-[200px] bg-[#333D4C] rounded-lg shadow-lg overflow-hidden p-4 flex flex-col justify-between cursor-pointer transition-all hover:shadow-xl hover:scale-105 hover:border hover:border-[#7C3AED]">

                    <p class="text-gray-400 text-sm">Pantalla principal de cobro con catalogo, carrito y metodos de pago.</p>
                </div>
            </a>

            <a href="pos-pedidos.html" class="group h-[200px] bg-[#333D4C] rounded-lg shadow-lg overflow-hidden p-4 flex flex-col justify-between cursor-pointer transition-all hover:shadow-xl hover:scale-105 hover:border hover:border-[#7C3AED]">
                <div class="w-14 h-14 bg-[#233876] rounded-lg flex items-center justify-center group-hover:scale-110 transition-transform">
                    <svg class="w-7 h-7 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>

                    <h3 class="text-lg font-semibold text-white group-hover:text-blue-400 transition-colors">Pedidos</h3>
                    <p class="text-gray-400 text-sm">Lista de ordenes programadas, cotizaciones y ventas con detalle lateral.</p>
