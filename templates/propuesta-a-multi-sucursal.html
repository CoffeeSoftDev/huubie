<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propuesta A - Multi Sucursal (Checkboxes)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#0f1117] min-h-screen flex items-center justify-center p-4">

    <!-- Modal -->
    <div class="w-full max-w-lg bg-[#1a1d27] rounded-xl border border-white/10 shadow-2xl">

        <!-- Header -->
        <div class="px-6 pt-6 pb-4 border-b border-white/10">
            <h2 class="text-white text-lg font-bold">Editar Usuario</h2>
            <p class="text-gray-400 text-sm mt-1">Asigna el usuario a una o varias sucursales</p>
        </div>

        <!-- Body -->
        <div class="px-6 py-5 space-y-5">

            <!-- Rol -->
            <div>
                <label class="text-gray-300 text-sm font-medium mb-1.5 block">Rol</label>
                <select class="w-full bg-[#0f1117] border border-white/10 rounded-lg px-3 py-2.5 text-white text-sm focus:outline-none focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/30">
                    <option>Administrador</option>
                    <option>Cajero</option>
                    <option>Vendedor</option>
                    <option>Lectura</option>
                </select>
            </div>

            <!-- Sucursales (Checkboxes) -->
            <div>
                <label class="text-gray-300 text-sm font-medium mb-1.5 block">Sucursales</label>
                <p class="text-gray-500 text-xs mb-3">Selecciona las sucursales donde opera este usuario</p>

                <div class="space-y-2 max-h-48 overflow-y-auto pr-1">
                    <!-- Sucursal item - checked -->
                    <label class="flex items-center gap-3 p-3 rounded-lg bg-blue-500/10 border border-blue-500/30 cursor-pointer hover:bg-blue-500/15 transition-colors">
                        <input type="checkbox" checked class="w-4 h-4 rounded border-white/20 bg-[#0f1117] text-blue-500 focus:ring-blue-500/30 focus:ring-offset-0">
                        <div class="flex-1">
                            <span class="text-white text-sm font-medium">Marinni Centro</span>
                        </div>
                        <span class="inline-flex items-center px-2 py-0.5 text-xs font-medium rounded-full bg-blue-500/15 text-blue-400">Activa</span>
                    </label>

                    <!-- Sucursal item - checked -->
                    <label class="flex items-center gap-3 p-3 rounded-lg bg-blue-500/10 border border-blue-500/30 cursor-pointer hover:bg-blue-500/15 transition-colors">
                        <input type="checkbox" checked class="w-4 h-4 rounded border-white/20 bg-[#0f1117] text-blue-500 focus:ring-blue-500/30 focus:ring-offset-0">
                        <div class="flex-1">
                            <span class="text-white text-sm font-medium">Club Campestre</span>
                        </div>
                        <span class="inline-flex items-center px-2 py-0.5 text-xs font-medium rounded-full bg-blue-500/15 text-blue-400">Activa</span>
                    </label>

                    <!-- Sucursal item - unchecked -->
                    <label class="flex items-center gap-3 p-3 rounded-lg bg-[#0f1117] border border-white/10 cursor-pointer hover:bg-white/5 transition-colors">
                        <input type="checkbox" class="w-4 h-4 rounded border-white/20 bg-[#0f1117] text-blue-500 focus:ring-blue-500/30 focus:ring-offset-0">
                        <div class="flex-1">
                            <span class="text-gray-300 text-sm font-medium">Reginas guadalupe</span>
                        </div>
                        <span class="inline-flex items-center px-2 py-0.5 text-xs font-medium rounded-full bg-gray-500/15 text-gray-400">--</span>
                    </label>

                    <!-- Sucursal item - unchecked -->
                    <label class="flex items-center gap-3 p-3 rounded-lg bg-[#0f1117] border border-white/10 cursor-pointer hover:bg-white/5 transition-colors">
                        <input type="checkbox" class="w-4 h-4 rounded border-white/20 bg-[#0f1117] text-blue-500 focus:ring-blue-500/30 focus:ring-offset-0">
                        <div class="flex-1">
                            <span class="text-gray-300 text-sm font-medium">Altozano</span>
                        </div>
                        <span class="inline-flex items-center px-2 py-0.5 text-xs font-medium rounded-full bg-gray-500/15 text-gray-400">--</span>
                    </label>

                    <!-- Sucursal item - unchecked -->
                    <label class="flex items-center gap-3 p-3 rounded-lg bg-[#0f1117] border border-white/10 cursor-pointer hover:bg-white/5 transition-colors">
                        <input type="checkbox" class="w-4 h-4 rounded border-white/20 bg-[#0f1117] text-blue-500 focus:ring-blue-500/30 focus:ring-offset-0">
                        <div class="flex-1">
                            <span class="text-gray-300 text-sm font-medium">Club campestre tap</span>
                        </div>
                        <span class="inline-flex items-center px-2 py-0.5 text-xs font-medium rounded-full bg-gray-500/15 text-gray-400">--</span>
                    </label>

                    <!-- Sucursal item - unchecked -->
                    <label class="flex items-center gap-3 p-3 rounded-lg bg-[#0f1117] border border-white/10 cursor-pointer hover:bg-white/5 transition-colors">
                        <input type="checkbox" class="w-4 h-4 rounded border-white/20 bg-[#0f1117] text-blue-500 focus:ring-blue-500/30 focus:ring-offset-0">
                        <div class="flex-1">
                            <span class="text-gray-300 text-sm font-medium">Regina's cuarta</span>
                        </div>
                        <span class="inline-flex items-center px-2 py-0.5 text-xs font-medium rounded-full bg-gray-500/15 text-gray-400">--</span>
                    </label>

                    <!-- Sucursal item - unchecked -->
                    <label class="flex items-center gap-3 p-3 rounded-lg bg-[#0f1117] border border-white/10 cursor-pointer hover:bg-white/5 transition-colors">
                        <input type="checkbox" class="w-4 h-4 rounded border-white/20 bg-[#0f1117] text-blue-500 focus:ring-blue-500/30 focus:ring-offset-0">
                        <div class="flex-1">
                            <span class="text-gray-300 text-sm font-medium">Reginas kafeto</span>
                        </div>
                        <span class="inline-flex items-center px-2 py-0.5 text-xs font-medium rounded-full bg-gray-500/15 text-gray-400">--</span>
                    </label>
                </div>

                <!-- Counter -->
                <div class="mt-3 flex items-center gap-2">
                    <span class="text-xs text-gray-500">Seleccionadas:</span>
                    <span class="inline-flex items-center px-2 py-0.5 text-xs font-bold rounded-full bg-blue-500/15 text-blue-400">2 de 7</span>
                </div>
            </div>

            <!-- Nombre -->
            <div>
                <label class="text-gray-300 text-sm font-medium mb-1.5 block">Nombre completo</label>
                <input type="text" value="Sergio Os" class="w-full bg-[#0f1117] border border-white/10 rounded-lg px-3 py-2.5 text-white text-sm focus:outline-none focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/30">
            </div>

            <!-- Usuario -->
            <div>
                <label class="text-white text-sm font-bold mb-1.5 block">Usuario (correo electr&oacute;nico)</label>
                <input type="email" value="sergio@marini.com" placeholder="Ej. luis@huubie.com" class="w-full bg-[#0f1117] border border-white/10 rounded-lg px-3 py-2.5 text-white text-sm focus:outline-none focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/30">
            </div>

            <!-- Contrasena -->
            <div>
                <label class="text-white text-sm font-bold mb-1.5 block">Contrase&ntilde;a</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    </span>
                    <input type="password" class="w-full bg-[#0f1117] border border-white/10 rounded-lg pl-9 pr-10 py-2.5 text-white text-sm focus:outline-none focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/30">
                    <button class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
                    </button>
                </div>
                <p class="text-gray-500 text-xs mt-1">Dejar vacio para mantener la actual</p>
            </div>
        </div>

        <!-- Footer -->
        <div class="px-6 py-4 border-t border-white/10 flex justify-end gap-3">
            <button class="px-4 py-2 text-sm font-medium text-gray-300 bg-[#0f1117] border border-white/10 rounded-lg hover:bg-white/5 transition-colors">
                Cancelar
            </button>
            <button class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors">
                Guardar
            </button>
        </div>
    </div>

</body>
</html>
