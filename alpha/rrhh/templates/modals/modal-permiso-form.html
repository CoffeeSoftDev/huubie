<!DOCTYPE html>
<html lang="es" class="bg-[#111928]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Permiso — Huubie RRHH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#111928; font-family:'Inter',system-ui,sans-serif; color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }

        /* Calendar inline */
        .calendar { background:#1a2332; border:1px solid #374151; border-radius:8px; padding:12px; position:absolute; top:calc(100% + 4px); left:0; z-index:20; width:100%; }
        .cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; font-size:11px; color:#d1d5db; font-weight:600; }
        .cal-nav { width:20px; height:20px; border-radius:4px; background:#111928; display:flex; align-items:center; justify-content:center; color:#9ca3af; cursor:pointer; }
        .cal-grid { display:grid; grid-template-columns:repeat(7, 1fr); gap:2px; }
        .cal-dow { font-size:9px; color:#6b7280; text-align:center; padding:4px 0; }
        .cal-day { font-size:10px; color:#d1d5db; text-align:center; padding:5px 0; border-radius:4px; cursor:pointer; }
        .cal-day:hover { background:#374151; }
        .cal-day.active { background:#7c3aed; color:#fff; font-weight:bold; }
        .cal-day.other { color:#4b5563; }
    </style>
</head>
<body>

    <!-- Backdrop -->
    <div class="fixed inset-0 bg-black/60"></div>

    <!-- Modal card -->
    <div class="relative w-[420px] bg-[#1F2A37] rounded-2xl p-6 border border-gray-700 z-10">
        <button class="absolute top-3 right-3 text-gray-400 hover:text-white" onclick="window.close()">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>

        <div class="flex items-center gap-3 mb-4">
            <h2 class="text-lg font-bold">Permiso</h2>
            <span class="text-sm text-gray-400">PC-001</span>
        </div>

        <div class="flex flex-col items-center mb-4">
            <div class="w-20 h-20 rounded-full bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center text-xl font-bold mb-2">JL</div>
            <p class="text-xs text-gray-400">Nombre de empleado</p>
        </div>

        <div class="space-y-3">
            <div>
                <label class="text-[11px] text-gray-500 block mb-1">Tipo</label>
                <select class="w-full bg-[#1a2332] border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-300 focus:outline-none focus:border-purple-500">
                    <option value="">Seleccionar tipo</option>
                    <option value="incapacidad" selected>Incapacidad</option>
                    <option value="vacaciones">Vacaciones</option>
                    <option value="permiso">Permiso</option>
                </select>
            </div>

            <div class="relative">
                <label class="text-[11px] text-gray-500 block mb-1">Inicia</label>
                <input type="text" value="4/08/2024" class="w-full bg-[#1a2332] border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-300 focus:outline-none focus:border-purple-500" readonly onclick="document.getElementById('cal').classList.toggle('hidden')">
                <div id="cal" class="calendar hidden">
                    <div class="cal-header">
                        <button class="cal-nav"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></button>
                        <span>August 2024</span>
                        <button class="cal-nav"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></button>
                    </div>
                    <div class="cal-grid">
                        <div class="cal-dow">Mo</div><div class="cal-dow">Tu</div><div class="cal-dow">We</div><div class="cal-dow">Th</div><div class="cal-dow">Fr</div><div class="cal-dow">Sa</div><div class="cal-dow">Su</div>
                        <div class="cal-day other">29</div><div class="cal-day other">30</div><div class="cal-day other">31</div><div class="cal-day">1</div><div class="cal-day">2</div><div class="cal-day">3</div><div class="cal-day active">4</div>
                        <div class="cal-day">5</div><div class="cal-day">6</div><div class="cal-day">7</div><div class="cal-day">8</div><div class="cal-day">9</div><div class="cal-day">10</div><div class="cal-day">11</div>
                        <div class="cal-day">12</div><div class="cal-day">13</div><div class="cal-day">14</div><div class="cal-day">15</div><div class="cal-day">16</div><div class="cal-day">17</div><div class="cal-day">18</div>
                        <div class="cal-day">19</div><div class="cal-day">20</div><div class="cal-day">21</div><div class="cal-day">22</div><div class="cal-day">23</div><div class="cal-day">24</div><div class="cal-day">25</div>
                        <div class="cal-day">26</div><div class="cal-day">27</div><div class="cal-day">28</div><div class="cal-day">29</div><div class="cal-day">30</div><div class="cal-day">31</div><div class="cal-day other">1</div>
                    </div>
                </div>
            </div>

            <div>
                <label class="text-[11px] text-gray-500 block mb-1">Finaliza</label>
                <input type="text" value="7/08/2024" class="w-full bg-[#1a2332] border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-300 focus:outline-none focus:border-purple-500" readonly>
            </div>

            <div>
                <label class="text-[11px] text-gray-500 block mb-1">Razón</label>
                <textarea rows="3" class="w-full bg-[#1a2332] border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-300 focus:outline-none focus:border-purple-500" placeholder="Accidente de trabajo..."></textarea>
            </div>
        </div>

        <div class="flex items-center gap-2 mt-5">
            <button class="flex-1 py-2 rounded-lg bg-gray-600 text-white text-xs font-semibold" onclick="window.close()">Cancelar</button>
            <button class="flex-1 py-2 rounded-lg bg-[#7c3aed] text-white text-xs font-semibold">Enviar</button>
            <button class="flex-1 py-2 rounded-lg bg-[#ea0234] text-white text-xs font-semibold">Rechazar</button>
            <button class="w-9 h-9 rounded-lg bg-[#1a2332] border border-gray-700 flex items-center justify-center text-gray-400 hover:text-white" title="Adjuntar foto">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            </button>
        </div>
    </div>

</body>
</html>
