<!DOCTYPE html>
<html lang="es" class="bg-[#111928]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Upload — Huubie RRHH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#111928; font-family:'Inter',system-ui,sans-serif; color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
    </style>
</head>
<body>

    <div class="fixed inset-0 bg-black/60"></div>

    <div class="relative w-[440px] bg-[#1F2A37] rounded-2xl p-8 border border-gray-700 z-10">
        <button class="absolute top-3 right-3 text-gray-400 hover:text-white" onclick="window.close()">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>

        <div class="flex flex-col items-center text-center">
            <div class="w-14 h-14 rounded-full bg-purple-500/20 flex items-center justify-center text-purple-400 mb-4">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
            </div>

            <h2 class="text-base font-bold text-white mb-1">
                Drag &amp; Drop or <span class="text-[#7c3aed] underline cursor-pointer">upload file</span> to upload
            </h2>
            <p class="text-[11px] text-gray-500 mb-5">Supported formats: .jpeg, .pdf</p>

            <!-- Drop zone -->
            <div class="w-full border-2 border-dashed border-gray-700 rounded-xl py-6 mb-5 text-gray-500 text-[11px]">
                <p>Arrastra un archivo aquí</p>
                <p class="text-[10px] text-gray-600 mt-1">o haz click para seleccionar</p>
            </div>

            <div class="flex gap-2 w-full">
                <button class="flex-1 py-2 rounded-lg bg-gray-600 text-white text-xs font-semibold hover:bg-gray-500" onclick="window.close()">Cancelar</button>
                <button class="flex-1 py-2 rounded-lg bg-[#1c64f2] text-white text-xs font-semibold hover:bg-blue-500">Enable</button>
            </div>
        </div>
    </div>

</body>
</html>
