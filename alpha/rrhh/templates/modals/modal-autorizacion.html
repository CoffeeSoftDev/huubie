<!DOCTYPE html>
<html lang="es" class="bg-[#111928]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Autorización — Huubie RRHH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#111928; font-family:'Inter',system-ui,sans-serif; color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
    </style>
</head>
<body>

    <div class="fixed inset-0 bg-black/60"></div>

    <div class="relative w-[400px] bg-[#1F2A37] rounded-2xl p-7 border border-gray-700 z-10">
        <button class="absolute top-3 right-3 text-gray-400 hover:text-white" onclick="window.close()">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>

        <p class="text-[10px] text-gray-500 uppercase tracking-wider mb-2">Autorización</p>

        <h2 class="text-2xl font-bold text-white leading-tight mb-1">Este cambio requiere</h2>
        <h2 class="text-2xl font-bold text-white leading-tight mb-6">autorización.</h2>

        <label class="text-xs text-gray-400 block mb-2">Contraseña</label>
        <input type="password" placeholder="****" class="w-full bg-[#141d2b] border border-gray-700 rounded-lg px-4 py-3 text-sm text-gray-300 mb-5 focus:outline-none focus:border-[#1c64f2]">

        <button class="px-6 py-2.5 rounded-lg bg-[#1c64f2] text-white text-sm font-semibold hover:bg-blue-500">Autorizar</button>
    </div>

</body>
</html>
