<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS — Punto de Venta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f1723; font-family: 'Inter', system-ui, sans-serif; color: #fff; height: 100vh; overflow: hidden; }
        .scrollbar-thin::-webkit-scrollbar { width: 4px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        .product-card { transition: all 0.12s ease; }
        .product-card:hover { border-color: #7c3aed; transform: translateY(-1px); }
        .product-card:active { transform: scale(0.97); }
        .cat-btn.active { background: #7c3aed; color: #fff; border-color: #7c3aed; }
        .cart-item { animation: slideIn 0.15s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        .nav-item.active { color: #7c3aed; border-color: #7c3aed; }
        .nav-item.active .nav-dot { background: #7c3aed; }
        .method-btn.active { background: #7c3aed !important; border-color: #7c3aed !important; color: #fff !important; }
        .method-btn { transition: all 0.12s ease; }
        .method-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="flex">

    <!-- ============================================================ -->
    <!-- OVERLAY: SIN TURNO ABIERTO                                   -->
    <!-- ============================================================ -->
    <div id="posNoShift" class="hidden absolute inset-0 z-50 bg-[#0f1723]/95 flex items-center justify-center">
        <div class="text-center space-y-4">
            <div class="w-16 h-16 mx-auto rounded-2xl bg-amber-500/10 border border-amber-500/30 flex items-center justify-center">
                <svg class="w-8 h-8 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            </div>
            <div>
                <h3 class="text-lg font-bold text-white">Sin turno abierto</h3>
                <p class="text-xs text-gray-400 mt-1">Abre un turno para comenzar a vender</p>
            </div>
            <button id="posOpenShiftBtn" class="px-5 py-2 rounded-lg text-xs font-semibold bg-amber-500 text-black hover:bg-amber-400 transition-colors">
                Abrir turno
            </button>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- NAV LATERAL (56px)                                           -->
    <!-- ============================================================ -->
    <div class="w-[56px] bg-[#111928] border-r border-gray-800 flex flex-col items-center py-3 gap-1 flex-shrink-0">
        <div class="w-8 h-8 rounded-lg bg-purple-600 flex items-center justify-center font-bold text-[10px] mb-3">RK</div>

        <button class="nav-item active w-10 h-10 rounded-lg border border-transparent flex flex-col items-center justify-center gap-0.5 text-purple-400" data-view="cobrar" title="Cobrar">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z"/></svg>
            <div class="nav-dot w-1 h-1 rounded-full bg-purple-400"></div>
        </button>
        <button class="nav-item w-10 h-10 rounded-lg border border-transparent flex flex-col items-center justify-center gap-0.5 text-gray-500 hover:text-gray-300" data-view="pedidos" title="Pedidos">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
            <div class="nav-dot w-1 h-1 rounded-full"></div>
        </button>
        <button class="nav-item w-10 h-10 rounded-lg border border-transparent flex flex-col items-center justify-center gap-0.5 text-gray-500 hover:text-gray-300" data-view="inventario" title="Inventario">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
            <div class="nav-dot w-1 h-1 rounded-full"></div>
        </button>
        <button class="nav-item w-10 h-10 rounded-lg border border-transparent flex flex-col items-center justify-center gap-0.5 text-gray-500 hover:text-gray-300" data-view="reportes" title="Reportes">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            <div class="nav-dot w-1 h-1 rounded-full"></div>
        </button>
        <button class="nav-item w-10 h-10 rounded-lg border border-transparent flex flex-col items-center justify-center gap-0.5 text-gray-500 hover:text-gray-300" data-view="merma" title="Merma">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.5c-.77-.833-2.694-.833-3.464 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
            <div class="nav-dot w-1 h-1 rounded-full"></div>
        </button>

        <div class="mt-auto space-y-1">
            <button class="nav-item w-10 h-10 rounded-lg border border-transparent flex items-center justify-center text-gray-500 hover:text-orange-400" data-view="cierre" title="Cierre del dia">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            </button>
            <button class="nav-item w-10 h-10 rounded-lg border border-transparent flex items-center justify-center text-gray-500 hover:text-gray-300" data-view="config" title="Configuracion">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            </button>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- PANEL CATALOGO (60%)                                         -->
    <!-- ============================================================ -->
    <div class="flex flex-col flex-1 min-w-0" style="max-width: 60%;">

        <!-- Header turno -->
        <div id="posShiftHeader" class="flex items-center justify-between px-4 py-2 bg-[#141d2b] border-b border-gray-800 flex-shrink-0">
            <div class="flex items-center gap-3">
                <div id="posShiftBadge" class="flex items-center gap-1.5 px-2.5 py-1 bg-green-900/30 border border-green-700/40 rounded-lg">
                    <div class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></div>
                    <span class="text-[10px] font-semibold text-green-400">TURNO ACTIVO</span>
                </div>
                <span id="posShiftInfo" class="text-[10px] text-gray-500">Sucursal — Cajero</span>
            </div>
            <div id="posShiftStats" class="flex items-center gap-2 text-[10px] text-gray-500">
                <span>Ventas: <strong class="text-green-400">$0</strong></span>
                <span class="text-gray-700">|</span>
                <span>Ordenes: <strong class="text-white">0</strong></span>
            </div>
        </div>

        <!-- Busqueda + Categorias -->
        <div class="px-4 pt-3 pb-2 space-y-2 flex-shrink-0">
            <div class="relative">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <input type="text" id="posSearchInput" placeholder="Buscar producto..." class="w-full bg-[#1a2332] border border-gray-700 rounded-lg pl-9 pr-4 py-2 text-xs text-white placeholder-gray-500 focus:outline-none focus:border-purple-500">
            </div>
            <div id="posCategoryTabs" class="flex gap-1.5 overflow-x-auto pb-1 scrollbar-thin">
                <button class="cat-btn active flex-shrink-0 px-3 py-1.5 rounded-lg text-[10px] font-semibold border border-gray-700" data-category-id="0">Todos</button>
                <!-- Categorias se cargan dinamicamente -->
            </div>
        </div>

        <!-- Grid de productos -->
        <div class="flex-1 overflow-y-auto px-4 pb-3 scrollbar-thin">
            <div id="posProductGrid" class="grid grid-cols-5 xl:grid-cols-6 2xl:grid-cols-7 gap-2">

                <!--
                    TEMPLATE CARD PRODUCTO (referencia para JS):

                    <div class="product-card bg-[#1a2332] border border-gray-700/50 rounded-lg overflow-hidden cursor-pointer"
                         data-product-id="ID" data-category-id="CAT_ID">
                        <div class="h-16 bg-gradient-to-br from-amber-900/30 to-amber-800/10 flex items-center justify-center relative">
                            <span class="text-2xl">EMOJI</span>
                            // O imagen: <img src="URL" class="w-full h-full object-cover" alt="NAME">
                            // Badge stock bajo (condicional):
                            // <span class="absolute top-1 right-1 w-4 h-4 rounded-full bg-orange-500 text-[8px] font-bold flex items-center justify-center">3</span>
                        </div>
                        <div class="p-2">
                            <p class="text-[10px] font-semibold truncate leading-tight">NOMBRE</p>
                            <p class="text-xs font-bold text-purple-400 mt-0.5">$PRECIO</p>
                        </div>
                    </div>
                -->

                <!-- Productos se cargan dinamicamente -->

                <!-- Card fija: Personalizado -->
                <div class="product-card bg-purple-900/20 border border-dashed border-purple-500/40 rounded-lg overflow-hidden cursor-pointer flex flex-col items-center justify-center" data-product-id="custom" style="min-height: 106px;">
                    <svg class="w-5 h-5 text-purple-400 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
                    <p class="text-[9px] font-bold text-purple-400">PERSONALIZADO</p>
                </div>

            </div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- PANEL CARRITO (40%)                                          -->
    <!-- ============================================================ -->
    <div class="flex flex-col bg-[#141d2b] border-l border-gray-800" style="width: 40%;">

        <!-- Header orden -->
        <div id="posCartHeader" class="px-4 py-2.5 border-b border-gray-800 flex items-center justify-between flex-shrink-0">
            <div>
                <div class="flex items-center gap-2">
                    <h2 id="posOrderFolio" class="text-sm font-bold">Nueva venta</h2>
                    <span class="px-1.5 py-0.5 rounded text-[8px] font-bold bg-blue-600/30 text-blue-400">POS</span>
                </div>
                <p id="posOrderItemCount" class="text-[10px] text-gray-500">0 items — Venta mostrador</p>
            </div>
            <button id="posBtnClearCart" class="w-7 h-7 rounded-lg bg-[#1a2332] border border-red-500/30 flex items-center justify-center text-red-400 hover:bg-red-600 hover:text-white" title="Vaciar carrito">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </button>
        </div>

        <!-- Cliente opcional (sin registro) -->
        <div id="posClientSection" class="px-4 py-2 border-b border-gray-800/50 flex-shrink-0">
            <div class="flex items-center gap-2 bg-[#1a2332] rounded-lg px-2.5 py-1.5 border border-gray-700">
                <svg class="w-3 h-3 text-gray-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                <input type="text" id="posClientName" placeholder="Cliente (opcional)" class="flex-1 bg-transparent text-[10px] text-white placeholder-gray-500 focus:outline-none">
            </div>
        </div>

        <!-- Items del carrito -->
        <div id="posCartItems" class="flex-1 overflow-y-auto px-3 py-2 space-y-1.5 scrollbar-thin">

            <!--
                TEMPLATE CART ITEM (referencia para JS):

                <div class="cart-item bg-[#1a2332] rounded-lg p-2.5 border border-gray-700/50 group" data-item-index="N">
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 rounded-md bg-amber-900/30 flex items-center justify-center flex-shrink-0">
                            <span class="text-sm">EMOJI</span>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-[11px] font-semibold truncate">NOMBRE PRODUCTO</p>
                            <div class="flex items-center gap-2 mt-1">
                                <div class="flex items-center gap-0.5">
                                    <button class="w-5 h-5 rounded bg-gray-700 flex items-center justify-center text-[10px] font-bold hover:bg-gray-600">-</button>
                                    <span class="w-6 text-center text-[10px] font-bold">QTY</span>
                                    <button class="w-5 h-5 rounded bg-gray-700 flex items-center justify-center text-[10px] font-bold hover:bg-gray-600">+</button>
                                </div>
                                <span class="text-[9px] text-gray-500">x $PRECIO</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-xs font-bold">$SUBTOTAL</p>
                            <button class="text-gray-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity mt-0.5">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
            -->

            <!-- Estado vacio -->
            <div id="posCartEmpty" class="flex flex-col items-center justify-center h-full text-center">
                <div class="w-12 h-12 rounded-xl bg-gray-800/50 flex items-center justify-center mb-3">
                    <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z"/></svg>
                </div>
                <p class="text-xs font-semibold text-gray-500">Selecciona productos</p>
                <p class="text-[10px] text-gray-600 mt-0.5">para comenzar la venta</p>
            </div>

        </div>

        <!-- Resumen + Cobro -->
        <div class="border-t border-gray-800 px-4 py-3 space-y-2.5 flex-shrink-0">

            <!-- Acciones rapidas -->
            <div class="flex gap-1.5">
                <button id="posBtnDiscount" class="flex items-center gap-1 px-2.5 py-1.5 rounded-lg bg-[#1a2332] border border-gray-700 text-[10px] text-gray-400 hover:text-orange-400 hover:border-orange-500/40">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
                    Descuento
                </button>
                <button id="posBtnNote" class="flex items-center gap-1 px-2.5 py-1.5 rounded-lg bg-[#1a2332] border border-gray-700 text-[10px] text-gray-400 hover:text-blue-400 hover:border-blue-500/40">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                    Nota
                </button>
                <button id="posBtnPrint" class="flex items-center gap-1 px-2.5 py-1.5 rounded-lg bg-[#1a2332] border border-gray-700 text-[10px] text-gray-400 hover:text-green-400 hover:border-green-500/40">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
                    Imprimir
                </button>
            </div>

            <!-- Totales -->
            <div id="posTotals" class="space-y-1">
                <div class="flex justify-between text-[11px] text-gray-500">
                    <span>Subtotal (<span id="posSubtotalCount">0 items, 0 pzas</span>)</span>
                    <span id="posSubtotal">$0.00</span>
                </div>
                <div id="posDiscountRow" class="flex justify-between text-[11px] text-orange-400 hidden">
                    <span>Descuento (<span id="posDiscountPct">0%</span>)</span>
                    <span id="posDiscountAmount">-$0.00</span>
                </div>
                <div class="flex justify-between text-base font-extrabold pt-1.5 border-t border-gray-700">
                    <span>TOTAL</span>
                    <span id="posTotal" class="text-green-400">$0.00</span>
                </div>
            </div>

            <!-- Metodos de pago -->
            <div id="posPaymentMethods" class="grid grid-cols-3 gap-1.5">
                <button class="method-btn active py-2 rounded-lg text-[10px] font-bold bg-green-600 text-white text-center" data-method-id="1">
                    Efectivo
                </button>
                <button class="method-btn py-2 rounded-lg text-[10px] font-bold bg-[#1a2332] border border-gray-700 text-gray-300 text-center hover:border-blue-500/50" data-method-id="2">
                    Tarjeta
                </button>
                <button class="method-btn py-2 rounded-lg text-[10px] font-bold bg-[#1a2332] border border-gray-700 text-gray-300 text-center hover:border-purple-500/50" data-method-id="3">
                    Transferencia
                </button>
            </div>

            <!-- Botones principales -->
            <div class="flex gap-2">
                <button id="posBtnCotizar" class="py-2.5 px-4 rounded-lg text-[11px] font-bold bg-[#1a2332] border border-blue-500/40 text-blue-400 hover:bg-blue-600 hover:text-white active:scale-95 transition-all">
                    Cotizar
                </button>
                <button id="posBtnCobrar" class="flex-1 py-2.5 rounded-lg text-sm font-extrabold bg-gradient-to-r from-green-600 to-emerald-500 text-white shadow-lg shadow-green-600/20 hover:from-green-500 hover:to-emerald-400 active:scale-[0.98] transition-all">
                    COBRAR $0.00
                </button>
            </div>
        </div>
    </div>

</body>
</html>
