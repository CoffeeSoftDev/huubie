<!DOCTYPE html>
<html lang="es" class="bg-[#111928]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleccionar Ingreso — Huubie Finanzas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#111928; font-family:'Inter',system-ui,sans-serif; color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
        .input-modal { background:#1a2332; border:1px solid #374151; border-radius:8px; padding:8px 12px; font-size:12px; color:#d1d5db; width:100%; }
        .input-modal:focus { outline:none; border-color:#7c3aed; }
        .card-btn { background:#fff; border:1px solid #e5e7eb; border-radius:10px; padding:12px 20px; font-size:13px; color:#374151; font-weight:500; cursor:pointer; transition:all .2s; text-align:center; }
        .card-btn:hover { border-color:#7c3aed; box-shadow:0 0 0 2px rgba(124,58,237,.15); }
        .card-btn.selected { border-color:#7c3aed; background:#f5f3ff; }
    </style>
</head>
<body>

    <div class="fixed inset-0 bg-black/60"></div>

    <div class="relative z-10 w-[480px] bg-[#1F2A37] rounded-2xl p-6 border border-gray-700">
        <button class="absolute top-3 right-3 text-gray-400 hover:text-white" onclick="window.close()">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>

        <h2 class="text-lg font-bold mb-6">Seleccionar Ingreso :</h2>

        <div class="grid grid-cols-2 gap-3 mb-3">
            <button class="card-btn" onclick="this.classList.toggle('selected')">Corte X</button>
            <button class="card-btn" onclick="this.classList.toggle('selected')">Corte Y</button>
        </div>

        <p class="text-[11px] text-gray-500 mb-4 ml-1">*Archivos: XLS, CSV, PDF</p>

        <div class="grid grid-cols-2 gap-3 mb-3">
            <button class="card-btn" onclick="this.classList.toggle('selected')">Manual Corte X</button>
            <button class="card-btn" onclick="this.classList.toggle('selected')">Manual Corte Y</button>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <button class="card-btn" onclick="this.classList.toggle('selected')">Ingreso de Efectivo</button>
            <button class="card-btn" onclick="this.classList.toggle('selected')">Deposito Bancos</button>
        </div>

        <div class="flex justify-center">
            <button class="px-10 py-2.5 rounded-lg bg-[#1c64f2] text-white text-sm font-semibold hover:bg-blue-600 transition">Aceptar</button>
        </div>
    </div>

</body>
</html>
