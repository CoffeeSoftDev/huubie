<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva solicitud - Huubie Inventarios</title>

    <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tema "Arcilla Invernal": remapea blue -> terracota (#C05A40). DEBE ir justo despues del CDN. -->
    <script>
        if (typeof tailwind !== 'undefined') {
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            blue: {
                                50:'#FBF3EF',100:'#F7E3DC',200:'#EFC9BC',300:'#E8A68F',400:'#D9826A',
                                500:'#C8694C',600:'#C05A40',700:'#A84A33',800:'#8F3D2A',900:'#6E2F20',950:'#4A1F16'
                            }
                        },
                        fontFamily: { sans: ['Inter','system-ui','sans-serif'] }
                    }
                }
            };
        }
    </script>
    <!-- Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family:'Inter',system-ui,sans-serif; background:#e5e7eb; }
        .phone-frame {
            width:390px; height:844px; background:#f3f4f6;
            border-radius:42px; box-shadow:0 25px 60px rgba(0,0,0,.35), 0 0 0 11px #1f2937, 0 0 0 13px #374151;
            overflow:hidden; position:relative;
        }
        .phone-scroll { height:100%; overflow-y:auto; -webkit-overflow-scrolling:touch; }
        .phone-scroll::-webkit-scrollbar{ width:0; display:none; }
        .notch { position:absolute; top:0; left:50%; transform:translateX(-50%); width:150px; height:26px; background:#1f2937; border-bottom-left-radius:16px; border-bottom-right-radius:16px; z-index:50; }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center py-8">

<div class="phone-frame">
    <div class="notch"></div>

    <!-- Status bar -->
    <div class="absolute top-0 left-0 right-0 h-7 px-6 flex items-center justify-between text-[11px] font-semibold text-gray-700 z-40">
        <span>9:41</span>
        <span class="flex items-center gap-1">
            <i data-lucide="signal" class="w-3.5 h-3.5"></i>
            <i data-lucide="wifi" class="w-3.5 h-3.5"></i>
            <i data-lucide="battery-full" class="w-4 h-4"></i>
        </span>
    </div>

    <div class="phone-scroll pt-7 pb-28">

        <!-- ===================== TOP BAR ===================== -->
        <div class="sticky top-0 z-30 bg-white border-b border-gray-200 px-3 py-3 flex items-center gap-2">
            <a href="mobile-mis-solicitudes.html" class="w-9 h-9 rounded-lg hover:bg-gray-100 flex items-center justify-center text-gray-600 flex-shrink-0">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </a>
            <h1 class="text-base font-bold text-gray-800">Nueva solicitud</h1>
        </div>

        <div class="px-4 pt-4 space-y-5">

            <!-- Sucursal fija (informativa) -->
            <div class="flex items-center gap-2.5 bg-blue-50 border border-blue-100 rounded-xl px-3.5 py-3">
                <div class="w-9 h-9 rounded-lg bg-blue-600 flex items-center justify-center text-white flex-shrink-0">
                    <i data-lucide="map-pin" class="w-4.5 h-4.5"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-[10px] uppercase tracking-wider text-blue-700/70 font-semibold">Sucursal solicitante</p>
                    <p class="text-sm font-bold text-gray-800">Sucursal Centro</p>
                </div>
                <i data-lucide="lock" class="w-4 h-4 text-blue-400 flex-shrink-0"></i>
            </div>

            <!-- Buscador de material -->
            <div>
                <label class="block text-[11px] font-semibold uppercase tracking-wider text-gray-500 mb-1.5">Buscar material</label>
                <div class="relative">
                    <i data-lucide="search" class="w-5 h-5 text-gray-400 absolute left-3.5 top-1/2 -translate-y-1/2"></i>
                    <input type="text" value="cafe" placeholder="Nombre o SKU del material..."
                           class="w-full pl-11 pr-4 py-3 text-sm text-gray-800 bg-white border border-gray-300 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100">
                </div>

                <!-- Resultados de busqueda (tappables) -->
                <div class="mt-2 bg-white border border-gray-200 rounded-xl divide-y divide-gray-100 overflow-hidden">
                    <button class="w-full flex items-center gap-3 px-3.5 py-3 text-left hover:bg-blue-50 active:bg-blue-50 transition-colors">
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-medium text-gray-800 truncate">Cafe Americano 250g</p>
                            <p class="text-[11px] text-gray-400">CAF-001 <span class="mx-1">&middot;</span> Bebidas</p>
                        </div>
                        <span class="flex items-center gap-1 px-2.5 py-1 rounded-lg bg-blue-600 text-white text-xs font-semibold flex-shrink-0">
                            <i data-lucide="plus" class="w-3.5 h-3.5"></i> Agregar
                        </span>
                    </button>
                    <button class="w-full flex items-center gap-3 px-3.5 py-3 text-left hover:bg-blue-50 active:bg-blue-50 transition-colors">
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-medium text-gray-800 truncate">Cafe Capuccino 250g</p>
                            <p class="text-[11px] text-gray-400">CAF-002 <span class="mx-1">&middot;</span> Bebidas</p>
                        </div>
                        <span class="flex items-center gap-1 px-2.5 py-1 rounded-lg bg-blue-600 text-white text-xs font-semibold flex-shrink-0">
                            <i data-lucide="plus" class="w-3.5 h-3.5"></i> Agregar
                        </span>
                    </button>
                    <button class="w-full flex items-center gap-3 px-3.5 py-3 text-left hover:bg-blue-50 active:bg-blue-50 transition-colors">
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-medium text-gray-800 truncate">Cafe Descafeinado 250g</p>
                            <p class="text-[11px] text-gray-400">CAF-003 <span class="mx-1">&middot;</span> Bebidas</p>
                        </div>
                        <span class="flex items-center gap-1 px-2.5 py-1 rounded-lg bg-blue-600 text-white text-xs font-semibold flex-shrink-0">
                            <i data-lucide="plus" class="w-3.5 h-3.5"></i> Agregar
                        </span>
                    </button>
                    <button class="w-full flex items-center gap-3 px-3.5 py-3 text-left hover:bg-blue-50 active:bg-blue-50 transition-colors">
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-medium text-gray-800 truncate">Filtros de cafe #4</p>
                            <p class="text-[11px] text-gray-400">CAF-FLT <span class="mx-1">&middot;</span> Insumos</p>
                        </div>
                        <span class="flex items-center gap-1 px-2.5 py-1 rounded-lg bg-blue-600 text-white text-xs font-semibold flex-shrink-0">
                            <i data-lucide="plus" class="w-3.5 h-3.5"></i> Agregar
                        </span>
                    </button>
                </div>
            </div>

            <!-- Materiales agregados -->
            <div>
                <div class="flex items-center justify-between mb-2">
                    <label class="text-[11px] font-semibold uppercase tracking-wider text-gray-500">Materiales agregados</label>
                    <span class="text-[11px] font-semibold text-blue-700 bg-blue-50 px-2 py-0.5 rounded-full">3</span>
                </div>

                <div class="space-y-2.5">
                    <!-- Renglon 1 -->
                    <div class="bg-white border border-gray-200 rounded-xl p-3">
                        <div class="flex items-start justify-between gap-2 mb-2.5">
                            <div class="flex-1 min-w-0">
                                <p class="text-sm font-medium text-gray-800 truncate">Cafe Americano 250g</p>
                                <p class="text-[11px] text-gray-400">CAF-001</p>
                            </div>
                            <button class="w-7 h-7 rounded-lg hover:bg-red-50 flex items-center justify-center text-gray-400 hover:text-red-500 flex-shrink-0 transition-colors">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                        <!-- Stepper -->
                        <div class="flex items-center justify-end gap-3">
                            <span class="text-[11px] text-gray-400 mr-auto">Cantidad</span>
                            <button class="w-8 h-8 rounded-lg border border-gray-300 flex items-center justify-center text-gray-600 hover:bg-gray-50 active:bg-gray-100">
                                <i data-lucide="minus" class="w-4 h-4"></i>
                            </button>
                            <span class="w-10 text-center text-base font-bold text-gray-800">10</span>
                            <button class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center text-white hover:bg-blue-700 active:scale-95">
                                <i data-lucide="plus" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Renglon 2 -->
                    <div class="bg-white border border-gray-200 rounded-xl p-3">
                        <div class="flex items-start justify-between gap-2 mb-2.5">
                            <div class="flex-1 min-w-0">
                                <p class="text-sm font-medium text-gray-800 truncate">Azucar Morena 1kg</p>
                                <p class="text-[11px] text-gray-400">AZU-003</p>
                            </div>
                            <button class="w-7 h-7 rounded-lg hover:bg-red-50 flex items-center justify-center text-gray-400 hover:text-red-500 flex-shrink-0 transition-colors">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                        <div class="flex items-center justify-end gap-3">
                            <span class="text-[11px] text-gray-400 mr-auto">Cantidad</span>
                            <button class="w-8 h-8 rounded-lg border border-gray-300 flex items-center justify-center text-gray-600 hover:bg-gray-50 active:bg-gray-100">
                                <i data-lucide="minus" class="w-4 h-4"></i>
                            </button>
                            <span class="w-10 text-center text-base font-bold text-gray-800">15</span>
                            <button class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center text-white hover:bg-blue-700 active:scale-95">
                                <i data-lucide="plus" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Renglon 3 -->
                    <div class="bg-white border border-gray-200 rounded-xl p-3">
                        <div class="flex items-start justify-between gap-2 mb-2.5">
                            <div class="flex-1 min-w-0">
                                <p class="text-sm font-medium text-gray-800 truncate">Leche Entera 1L</p>
                                <p class="text-[11px] text-gray-400">LEC-004</p>
                            </div>
                            <button class="w-7 h-7 rounded-lg hover:bg-red-50 flex items-center justify-center text-gray-400 hover:text-red-500 flex-shrink-0 transition-colors">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                        <div class="flex items-center justify-end gap-3">
                            <span class="text-[11px] text-gray-400 mr-auto">Cantidad</span>
                            <button class="w-8 h-8 rounded-lg border border-gray-300 flex items-center justify-center text-gray-600 hover:bg-gray-50 active:bg-gray-100">
                                <i data-lucide="minus" class="w-4 h-4"></i>
                            </button>
                            <span class="w-10 text-center text-base font-bold text-gray-800">24</span>
                            <button class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center text-white hover:bg-blue-700 active:scale-95">
                                <i data-lucide="plus" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Nota / justificacion -->
            <div>
                <label class="block text-[11px] font-semibold uppercase tracking-wider text-gray-500 mb-1.5">Nota / justificacion <span class="text-gray-400 normal-case font-normal">(opcional)</span></label>
                <textarea rows="3" placeholder="Ej. Reabastecimiento semanal para barra..."
                          class="w-full px-3.5 py-3 text-sm text-gray-800 bg-white border border-gray-300 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 resize-none"></textarea>
            </div>

            <!-- Resumen minimo -->
            <div class="bg-white border border-gray-200 rounded-xl p-3.5 flex items-center justify-around">
                <div class="text-center">
                    <p class="text-2xl font-bold text-gray-800">3</p>
                    <p class="text-[11px] text-gray-500">Materiales</p>
                </div>
                <div class="w-px h-9 bg-gray-200"></div>
                <div class="text-center">
                    <p class="text-2xl font-bold text-blue-600">49</p>
                    <p class="text-[11px] text-gray-500">Unidades totales</p>
                </div>
            </div>

        </div>
    </div>

    <!-- ===================== BOTON STICKY ENVIAR ===================== -->
    <div class="absolute bottom-0 left-0 right-0 bg-white border-t border-gray-200 px-4 pt-3 pb-6 z-30">
        <a href="mobile-mis-solicitudes.html"
           class="w-full h-12 rounded-xl bg-blue-600 hover:bg-blue-700 active:scale-[.99] transition-all flex items-center justify-center gap-2 text-white text-sm font-bold shadow-lg shadow-blue-600/30">
            <i data-lucide="send" class="w-4.5 h-4.5"></i> Enviar solicitud
        </a>
    </div>

</div>

<script>
    lucide.createIcons();
</script>
</body>
</html>
