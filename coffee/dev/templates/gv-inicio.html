<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo Varoch · Inicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        body { font-family:'Inter',system-ui,sans-serif; background:#F2F5F9; color:#0F172A; margin:0; }

        /* ── Navbar institucional blanco (los widgets los inyectan gv-navbar-*.js) ── */
        .navbar-main { background:#FFFFFF; border-bottom:1px solid rgba(0,51,96,.18) !important; }
        .nav-logo { width:36px; height:36px; border-radius:10px; background:linear-gradient(135deg,#003360 0%,#2563EB 100%); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:13px; box-shadow:0 4px 12px rgba(0,51,96,.35); flex-shrink:0; }
        .navbar-title { font-size:15px; font-weight:700; color:#111827; line-height:1.15; }
        .navbar-subtitle { font-size:10px; color:#94A3B8; letter-spacing:.12em; text-transform:uppercase; }
        .nav-theme-toggle { width:38px; height:38px; display:flex; align-items:center; justify-content:center; color:#64748B; border:none; background:transparent; cursor:pointer; transition:color .15s ease; }
        .nav-theme-toggle:hover { color:#003360; }
        .nav-user-pill { padding:4px 8px 4px 13px; border:1px solid transparent; border-left:1px solid #E2E8F0; border-radius:8px; transition:all .15s ease; cursor:pointer; }
        .nav-user-pill:hover { background:#F1F5F9; border-color:#E2E8F0; }
        .nav-avatar { width:38px; height:38px; border-radius:9999px; background:#003360; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:13px; box-shadow:0 4px 12px rgba(0,51,96,.32); }
        .nav-user-name { font-size:13px; font-weight:600; color:#111827; }
        .nav-user-rol  { font-size:11px; color:#64748B; }
        .nav-chevron { color:#94A3B8; transition:transform .2s ease; }

        /* ── Rail lateral de ejemplo (#menu-sidebar, mismo de gv-navbar / gv-perfil) ── */
        .menu-rail-item { position:relative; width:48px; min-height:46px; border-radius:11px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; padding:7px 2px; color:#64748B; background:transparent; border:1px solid transparent; cursor:pointer; text-align:center; transition:color .15s ease, background .15s ease, border-color .15s ease; }
        .menu-rail-item i, .menu-rail-item svg { width:19px; height:19px; flex-shrink:0; }
        .menu-rail-label { font-size:8.5px; font-weight:600; letter-spacing:.01em; line-height:1; white-space:nowrap; }
        .menu-rail-item:hover { color:#111827; background:#F1F5F9; border-color:#E2E8F0; }
        .menu-rail-item.is-active { color:#003360; background:rgba(0,51,96,.10); border-color:rgba(0,51,96,.14); }

        /* ── Contenido limpio ── */
        .dash-empty { border:2px dashed #CBD5E1; border-radius:18px; background:#FFFFFF; }
        .dash-empty-ico { width:72px; height:72px; border-radius:20px; background:rgba(0,51,96,.07); color:#003360; display:flex; align-items:center; justify-content:center; margin:0 auto; }
        .dash-empty-ico i { width:34px; height:34px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- ══════════ NAVBAR (widgets inyectados por gv-navbar-*.js) ══════════ -->
    <nav class="navbar-main w-full px-4 py-2 h-16 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="nav-logo">GV</div>
            <div class="flex flex-col leading-tight">
                <span class="navbar-title">Grupo Varoch</span>
                <span class="navbar-subtitle">Corporativo Varoch</span>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button id="btnModulos" class="nav-theme-toggle" title="Módulos" onclick="location.href='gv-modulos.html'">
                <i data-lucide="layout-grid" class="w-[18px] h-[18px]"></i>
            </button>
            <button class="nav-user-pill flex items-center gap-2.5">
                <div class="nav-avatar">RA</div>
                <div class="hidden sm:flex flex-col items-start leading-tight">
                    <span class="nav-user-name">Rosa A.</span>
                    <span class="nav-user-rol">Administradora</span>
                </div>
                <i data-lucide="chevron-down" class="nav-chevron w-4 h-4"></i>
            </button>
        </div>
    </nav>

    <!-- ══════════ Rail lateral + área de trabajo ══════════ -->
    <div class="flex" style="height: calc(100vh - 64px);">
        <aside id="menu-sidebar" class="bg-white border-r border-slate-200 flex flex-col items-center py-4 gap-1" style="width:60px;">
            <button class="menu-rail-item is-active"><i data-lucide="layout-dashboard"></i><span class="menu-rail-label">Inicio</span></button>
            <button class="menu-rail-item"><i data-lucide="users"></i><span class="menu-rail-label">Capital</span></button>
            <button class="menu-rail-item"><i data-lucide="wallet"></i><span class="menu-rail-label">Tesorería</span></button>
            <button class="menu-rail-item" onclick="location.href='gv-contabilidad.html'"><i data-lucide="calculator"></i><span class="menu-rail-label">Contab.</span></button>
            <button class="menu-rail-item"><i data-lucide="badge-check"></i><span class="menu-rail-label">Calidad</span></button>
            <button class="menu-rail-item" onclick="location.href='gv-kpi.html'"><i data-lucide="bar-chart-3"></i><span class="menu-rail-label">KPI</span></button>
        </aside>

        <main class="flex-1 p-6 overflow-y-auto">
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="flex items-center gap-2 text-xs">
                    <li class="uppercase tracking-wide text-slate-400">Corporativo</li>
                    <li class="text-slate-300">/</li>
                    <li class="font-bold" style="color:#003360;">Inicio</li>
                </ol>
            </nav>

            <h1 class="text-2xl font-extrabold tracking-tight" style="color:#003360;">¡Buen día, Rosy! 👋</h1>
            <p class="text-sm text-slate-500 mt-1">Tablero de inicio del corporativo. Usa el rail lateral o el botón de módulos para navegar.</p>

            <div class="dash-empty mt-6 p-12 flex flex-col items-center justify-center text-center" style="min-height:calc(100vh - 260px);">
                <div class="dash-empty-ico"><i data-lucide="layout-dashboard"></i></div>
                <h2 class="mt-5 text-lg font-bold" style="color:#003360;">Tu tablero de inicio</h2>
                <p class="mt-1.5 text-sm text-slate-500 max-w-sm">Área limpia lista para colocar KPIs, accesos rápidos y widgets del corporativo.</p>
                <a href="gv-modulos.html" class="mt-6 inline-flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold text-white" style="background:#003360;">
                    <i data-lucide="layout-grid" class="w-4 h-4"></i> Ir a módulos
                </a>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        document.querySelectorAll('.menu-rail-item').forEach(i => i.addEventListener('click', () => {
            document.querySelectorAll('.menu-rail-item').forEach(x => x.classList.remove('is-active'));
            i.classList.add('is-active');
        }));
    </script>
    <script src="gv-navbar-theme.js"></script>
    <script src="gv-navbar-branch.js"></script>
    <script src="gv-navbar-score.js"></script>
    <script src="gv-navbar-user.js"></script>
</body>
</html>
