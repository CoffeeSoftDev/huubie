<!DOCTYPE html>
<html lang="es">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — Grupo Varoch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #003360;
            --primary-dark: #01203C;
            --secondary: #F24444;
            --success: #7AAB20;
            --middle: #AAD3EB;
            --aliceblue: #FAFCFF;
            --blue-branch: #2E86C1;
            --blue-text: #1B5E8C;
        }
        * { font-family: 'Inter', sans-serif; }
        body { background: var(--aliceblue); }

        /* ============ ANIMACIÓN DEL LOGOTIPO ============ */

        /* Estados iniciales (ocultos hasta que #logo-stage tenga .play) */
        .arc    { stroke-dasharray: 1 1; stroke-dashoffset: 1; }
        .limb   { stroke-dasharray: 1 1; stroke-dashoffset: 1; }
        .leaf-in { transform: scale(0); transform-origin: 0px 0px; }
        .ltr    { stroke-dasharray: 380; stroke-dashoffset: 380; fill-opacity: 0; }
        .tagline { opacity: 0; }

        .play .arc     { animation: draw 1.1s cubic-bezier(.65,0,.35,1) var(--d, .1s) forwards; }
        .play .limb    { animation: draw .6s ease-out var(--d, 1s) forwards; }
        .play .leaf-in { animation: leafPop .55s cubic-bezier(.34,1.56,.64,1) var(--d, 2.2s) forwards; }
        .play .ltr     { animation: draw .9s ease var(--d, 2.6s) forwards,
                                    inkFill .6s ease calc(var(--d, 2.6s) + .5s) forwards; }
        .play .tagline { animation: fadeUp .8s ease 4.2s forwards; }

        @keyframes draw    { to { stroke-dashoffset: 0; } }
        @keyframes inkFill { to { fill-opacity: 1; } }
        @keyframes leafPop {
            0%   { transform: scale(0); }
            70%  { transform: scale(1.18); }
            100% { transform: scale(1); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Entrada del panel de formulario */
        .card-enter { opacity: 0; animation: fadeUp .7s ease .45s forwards; }

        @media (prefers-reduced-motion: reduce) {
            .arc, .limb, .ltr { stroke-dashoffset: 0 !important; animation: none !important; }
            .ltr { fill-opacity: 1 !important; }
            .leaf-in { transform: scale(1) !important; animation: none !important; }
            .tagline, .card-enter { opacity: 1 !important; animation: none !important; }
        }

        /* Modo ?snap: estado final sin animar (QA / screenshots) */
        .snap .arc, .snap .limb, .snap .ltr { stroke-dashoffset: 0 !important; animation: none !important; }
        .snap .ltr { fill-opacity: 1 !important; }
        .snap .leaf-in { transform: scale(1) !important; animation: none !important; }
        .snap .tagline, .snap .card-enter { opacity: 1 !important; animation: none !important; }

        /* ============ FORMULARIO ============ */
        .input-field {
            width: 100%; font-size: 14px; color: #1e293b;
            background: #fff; border: 1px solid #dbe4ee; border-radius: 10px;
            padding: 11px 42px 11px 42px; transition: border-color .15s, box-shadow .15s;
        }
        .input-field:focus {
            outline: none; border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 51, 96, .12);
        }
        .input-field::placeholder { color: #94a3b8; }

        .btn-primary {
            background: var(--primary); color: #fff;
            transition: background .15s, transform .1s;
        }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-primary:active { transform: scale(.985); }

        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">

    <div class="min-h-screen flex flex-col lg:flex-row">

        <!-- ============ PANEL IZQUIERDO · LOGOTIPO ANIMADO ============ -->
        <section class="relative flex-1 flex items-center justify-center px-6 py-10 lg:py-0 overflow-hidden">
            <!-- blobs decorativos -->
            <div class="absolute -top-32 -left-32 w-96 h-96 rounded-full pointer-events-none"
                 style="background: radial-gradient(circle, rgba(170,211,235,.35), transparent 70%);"></div>
            <div class="absolute -bottom-40 -right-24 w-[28rem] h-[28rem] rounded-full pointer-events-none"
                 style="background: radial-gradient(circle, rgba(0,51,96,.08), transparent 70%);"></div>

            <div id="logo-stage" class="relative flex flex-col items-center">
                <svg viewBox="0 0 480 590" class="w-64 sm:w-72 lg:w-96 h-auto" role="img" aria-label="Logotipo Grupo Varoch">
                    <defs>
                        <linearGradient id="gradArc" x1="0" y1="0" x2="0.35" y2="1">
                            <stop offset="0%"  stop-color="#1B75BB"/>
                            <stop offset="55%" stop-color="#124C7E"/>
                            <stop offset="100%" stop-color="#0A2A4A"/>
                        </linearGradient>
                        <linearGradient id="gradTrunk" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%"  stop-color="#1B75BB"/>
                            <stop offset="60%" stop-color="#1B75BB"/>
                            <stop offset="100%" stop-color="#0C3358"/>
                        </linearGradient>
                        <path id="leaf" d="M0 0 C5 -17 22 -26 37 -21 C35 -6 19 5 0 0 Z"/>
                    </defs>

                    <!-- Marca: letras G y V estilizadas forman el aro -->
                    <!-- G · creciente exterior -->
                    <path class="arc" pathLength="1"
                          d="M179 24 A205 205 0 0 0 178.9 420"
                          fill="none" stroke="url(#gradArc)" stroke-width="36" stroke-linecap="round"/>
                    <!-- G · descendente que emerge del creciente + barra superior -->
                    <path class="limb" style="--d:.9s" pathLength="1"
                          d="M181 421 C202 427 215 404 216 378 C217 312 216 245 217 191 L132 186"
                          fill="none" stroke="url(#gradTrunk)" stroke-width="26"
                          stroke-linecap="round" stroke-linejoin="round"/>
                    <!-- V · asta que se funde con el arco derecho -->
                    <path class="limb" style="--d:1.15s" pathLength="1"
                          d="M285 420 C263 426 251 404 250 378 C249 312 248 245 245 187"
                          fill="none" stroke="url(#gradTrunk)" stroke-width="26" stroke-linecap="round"/>
                    <!-- V · arco derecho -->
                    <path class="arc" style="--d:1.25s" pathLength="1"
                          d="M287.2 419.2 A195 195 0 0 0 428.4 179.5"
                          fill="none" stroke="url(#gradArc)" stroke-width="34" stroke-linecap="round"/>

                    <!-- Ramas: tramos cortos con horquetas en Y -->
                    <g fill="none" stroke="#1B75BB" stroke-linecap="round">
                        <path class="limb" style="--d:1.7s"  pathLength="1" stroke-width="11" d="M205 172 L171 146"/>
                        <path class="limb" style="--d:1.85s" pathLength="1" stroke-width="10" d="M171 146 L153 135"/>
                        <path class="limb" style="--d:1.95s" pathLength="1" stroke-width="9"  d="M153 135 L137 134"/>
                        <path class="limb" style="--d:1.9s"  pathLength="1" stroke-width="8"  d="M177 151 L182 124"/>
                        <path class="limb" style="--d:2s"    pathLength="1" stroke-width="7"  d="M182 124 L166 108"/>
                        <path class="limb" style="--d:2.05s" pathLength="1" stroke-width="7"  d="M182 124 L195 106"/>
                        <path class="limb" style="--d:1.75s" pathLength="1" stroke-width="12" d="M242 182 L240 120"/>
                        <path class="limb" style="--d:1.9s"  pathLength="1" stroke-width="10" d="M240 120 L237 72"/>
                        <path class="limb" style="--d:1.95s" pathLength="1" stroke-width="9"  d="M240 120 L215 96"/>
                        <path class="limb" style="--d:2.05s" pathLength="1" stroke-width="8"  d="M215 96 L200 84"/>
                        <path class="limb" style="--d:2s"    pathLength="1" stroke-width="9"  d="M240 108 L262 82"/>
                        <path class="limb" style="--d:1.8s"  pathLength="1" stroke-width="12" d="M252 182 L295 145"/>
                        <path class="limb" style="--d:1.95s" pathLength="1" stroke-width="10" d="M295 145 L330 122"/>
                        <path class="limb" style="--d:2s"    pathLength="1" stroke-width="9"  d="M295 145 L290 112"/>
                        <path class="limb" style="--d:2.1s"  pathLength="1" stroke-width="8"  d="M330 122 L352 104"/>
                        <path class="limb" style="--d:1.85s" pathLength="1" stroke-width="13" d="M266 198 L352 228"/>
                        <path class="limb" style="--d:2.05s" pathLength="1" stroke-width="9"  d="M315 216 L342 194"/>
                        <path class="limb" style="--d:2.1s"  pathLength="1" stroke-width="8"  d="M330 222 L354 214"/>
                    </g>

                    <!-- Hojas -->
                    <g>
                        <g transform="translate(164 104) rotate(-105) scale(.7)"><g class="leaf-in" style="--d:2.2s"><use href="#leaf" fill="#8CC63F"/></g></g>
                        <g transform="translate(191 106) rotate(-70) scale(.7)"><g class="leaf-in" style="--d:2.27s"><use href="#leaf" fill="#7AAB20"/></g></g>
                        <g transform="translate(143 118) rotate(-135) scale(.7)"><g class="leaf-in" style="--d:2.34s"><use href="#leaf" fill="#9BD34A"/></g></g>
                        <g transform="translate(132 132) rotate(-175) scale(.7)"><g class="leaf-in" style="--d:2.41s"><use href="#leaf" fill="#8CC63F"/></g></g>
                        <g transform="translate(135 154) rotate(-160) scale(.65)"><g class="leaf-in" style="--d:2.45s"><use href="#leaf" fill="#9BD34A"/></g></g>
                        <g transform="translate(204 72) rotate(-100) scale(.8)"><g class="leaf-in" style="--d:2.48s"><use href="#leaf" fill="#7AAB20"/></g></g>
                        <g transform="translate(237 68) rotate(-90) scale(.85)"><g class="leaf-in" style="--d:2.55s"><use href="#leaf" fill="#8CC63F"/></g></g>
                        <g transform="translate(264 78) rotate(-55) scale(.8)"><g class="leaf-in" style="--d:2.62s"><use href="#leaf" fill="#7AAB20"/></g></g>
                        <g transform="translate(290 108) rotate(-75) scale(.8)"><g class="leaf-in" style="--d:2.69s"><use href="#leaf" fill="#9BD34A"/></g></g>
                        <g transform="translate(354 100) rotate(-35) scale(.8)"><g class="leaf-in" style="--d:2.76s"><use href="#leaf" fill="#8CC63F"/></g></g>
                        <g transform="translate(390 150) rotate(-15) scale(.75)"><g class="leaf-in" style="--d:2.83s"><use href="#leaf" fill="#7AAB20"/></g></g>
                        <g transform="translate(344 190) rotate(-40) scale(.8)"><g class="leaf-in" style="--d:2.9s"><use href="#leaf" fill="#8CC63F"/></g></g>
                        <g transform="translate(356 212) rotate(-20) scale(.75)"><g class="leaf-in" style="--d:2.97s"><use href="#leaf" fill="#9BD34A"/></g></g>
                        <g transform="translate(358 232) rotate(-10) scale(.7)"><g class="leaf-in" style="--d:3.04s"><use href="#leaf" fill="#7AAB20"/></g></g>
                    </g>

                    <!-- GRUPO -->
                    <g font-family="Cinzel, serif" font-size="54" font-weight="600"
                       text-anchor="middle" fill="#1B5E8C" stroke="#1B5E8C" stroke-width="1.4">
                        <text class="ltr" style="--d:2.6s"  x="144" y="506">G</text>
                        <text class="ltr" style="--d:2.72s" x="192" y="506">R</text>
                        <text class="ltr" style="--d:2.84s" x="240" y="506">U</text>
                        <text class="ltr" style="--d:2.96s" x="288" y="506">P</text>
                        <text class="ltr" style="--d:3.08s" x="336" y="506">O</text>
                    </g>

                    <!-- VAROCH -->
                    <g font-family="Cinzel, serif" font-size="54" font-weight="600"
                       text-anchor="middle" fill="#1B5E8C" stroke="#1B5E8C" stroke-width="1.4">
                        <text class="ltr" style="--d:3.2s"  x="120" y="568">V</text>
                        <text class="ltr" style="--d:3.32s" x="168" y="568">A</text>
                        <text class="ltr" style="--d:3.44s" x="216" y="568">R</text>
                        <text class="ltr" style="--d:3.56s" x="264" y="568">O</text>
                        <text class="ltr" style="--d:3.68s" x="312" y="568">C</text>
                        <text class="ltr" style="--d:3.8s"  x="360" y="568">H</text>
                    </g>
                </svg>

                <p class="tagline mt-5 text-sm text-slate-500 tracking-wide text-center">
                    Crecemos juntos, echamos raíces.
                </p>

                <button id="btn-replay" type="button"
                        class="tagline mt-3 inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-slate-500 border border-slate-200 rounded-full bg-white/70 hover:bg-white hover:text-[#003360] transition">
                    <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/>
                    </svg>
                    Repetir animación
                </button>
            </div>
        </section>

        <!-- ============ PANEL DERECHO · FORMULARIO ============ -->
        <section class="relative lg:w-[46%] xl:w-[42%] flex items-center justify-center px-6 py-12 overflow-hidden"
                 style="background: linear-gradient(160deg, #003360 0%, #01203C 100%);">
            <!-- decoración -->
            <div class="absolute top-0 right-0 w-72 h-72 rounded-full pointer-events-none"
                 style="background: radial-gradient(circle, rgba(170,211,235,.15), transparent 70%);"></div>
            <div class="absolute bottom-0 left-0 w-80 h-80 rounded-full pointer-events-none"
                 style="background: radial-gradient(circle, rgba(46,134,193,.12), transparent 70%);"></div>

            <div class="card-enter relative w-full max-w-md">
                <div class="bg-white rounded-2xl shadow-2xl p-8 sm:p-10">
                    <div class="mb-8">
                        <span class="inline-block px-2.5 py-1 mb-3 text-[10px] font-bold tracking-widest rounded"
                              style="background: rgba(170,211,235,.35); color: #003360;">ERP · GRUPO VAROCH</span>
                        <h1 class="text-2xl font-bold text-slate-900">Bienvenido de nuevo</h1>
                        <p class="text-sm text-slate-500 mt-1">Ingresa tus credenciales para acceder al sistema</p>
                    </div>

                    <form id="login-form" class="space-y-5" novalidate>
                        <div>
                            <label for="usuario" class="block text-xs font-semibold text-slate-600 mb-1.5">Usuario</label>
                            <div class="relative">
                                <svg class="w-[18px] h-[18px] text-slate-400 absolute left-3.5 top-1/2 -translate-y-1/2 pointer-events-none"
                                     viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                                </svg>
                                <input id="usuario" name="usuario" type="text" autocomplete="username"
                                       class="input-field" placeholder="tu.usuario" required>
                            </div>
                        </div>

                        <div>
                            <div class="flex items-center justify-between mb-1.5">
                                <label for="password" class="block text-xs font-semibold text-slate-600">Contraseña</label>
                                <a href="#" class="text-xs font-medium hover:underline" style="color: #F24444;">¿Olvidaste tu contraseña?</a>
                            </div>
                            <div class="relative">
                                <svg class="w-[18px] h-[18px] text-slate-400 absolute left-3.5 top-1/2 -translate-y-1/2 pointer-events-none"
                                     viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                </svg>
                                <input id="password" name="password" type="password" autocomplete="current-password"
                                       class="input-field" placeholder="••••••••" required>
                                <button type="button" id="toggle-pass" aria-label="Mostrar contraseña"
                                        class="absolute right-3 top-1/2 -translate-y-1/2 p-1 text-slate-400 hover:text-[#003360] transition">
                                    <svg id="icon-eye" class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
                                    </svg>
                                    <svg id="icon-eye-off" class="w-[18px] h-[18px] hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.4 10.4 0 0 1 12 5c6.5 0 10 7 10 7a13.2 13.2 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.5 13.5 0 0 0 2 12s3.5 7 10 7a9.7 9.7 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div class="flex items-center gap-2">
                            <input id="remember" type="checkbox" class="w-4 h-4 rounded border-slate-300" style="accent-color: #003360;">
                            <label for="remember" class="text-sm text-slate-600 select-none">Mantener sesión iniciada</label>
                        </div>

                        <button type="submit" id="btn-login"
                                class="btn-primary w-full py-3 rounded-xl text-sm font-semibold flex items-center justify-center gap-2">
                            <span id="btn-login-text">Iniciar sesión</span>
                            <svg id="btn-login-spinner" class="spin w-4 h-4 hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                                <path d="M21 12a9 9 0 1 1-6.2-8.56"/>
                            </svg>
                        </button>
                    </form>
                </div>

                <p class="text-center text-xs mt-6" style="color: rgba(170,211,235,.7);">
                    © 2026 Grupo Varoch · ERP-GV · Todos los derechos reservados
                </p>
            </div>
        </section>
    </div>

    <script>
        if (new URLSearchParams(location.search).has('snap')) {
            document.documentElement.classList.add('snap');
        }

        const stage = document.getElementById('logo-stage');

        function playLogo() {
            stage.classList.remove('play');
            void stage.offsetWidth;
            stage.classList.add('play');
        }

        document.getElementById('btn-replay').addEventListener('click', playLogo);
        Promise.race([
            document.fonts.ready,
            new Promise((resolve) => setTimeout(resolve, 800))
        ]).then(playLogo);

        document.getElementById('toggle-pass').addEventListener('click', () => {
            const input = document.getElementById('password');
            const show = input.type === 'password';
            input.type = show ? 'text' : 'password';
            document.getElementById('icon-eye').classList.toggle('hidden', show);
            document.getElementById('icon-eye-off').classList.toggle('hidden', !show);
        });

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const txt = document.getElementById('btn-login-text');
            const spinner = document.getElementById('btn-login-spinner');

            btn.disabled = true;
            txt.textContent = 'Verificando...';
            spinner.classList.remove('hidden');

            setTimeout(() => {
                window.location.href = 'gv-modulos.html';
            }, 1400);
        });
    </script>
</body>
</html>
