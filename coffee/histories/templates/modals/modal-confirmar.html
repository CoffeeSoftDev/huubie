<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar - Historias de Usuario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../utils/coffee-varoch.css">
    <style>body{font-family:'Inter',system-ui,sans-serif;}</style>
</head>
<body class="coffee-varoch cv-page bg-black/60 flex items-center justify-center min-h-screen">

    <div class="cv-card w-full max-w-sm rounded-xl border border-[var(--cv-border)] shadow-2xl p-6">
        <div class="flex items-center justify-between mb-4">
            <h3 class="cv-title font-bold text-lg">Confirmar</h3>
            <button onclick="window.close()" class="p-1 rounded-md hover:bg-gray-100 text-gray-400">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>

        <div class="mb-6">
            <p class="cv-text text-sm">Estas seguro de que deseas eliminar esta tarea?</p>
            <p class="cv-muted text-xs mt-1">Esta accion no se puede deshacer.</p>
        </div>

        <div class="flex items-center justify-end gap-3">
            <button onclick="window.close()" class="cv-btn cv-btn-ghost px-5 py-2 rounded-lg text-sm font-medium">Cancelar</button>
            <button class="cv-btn cv-btn-danger px-5 py-2 rounded-lg text-sm font-medium">Eliminar</button>
        </div>
    </div>

</body>
</html>
