<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Pago | Huubie POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        inter: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        body {
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .input-pos {
            background: #1a2332;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 14px;
            color: #d1d5db;
            width: 100%;
            transition: all 0.15s ease;
        }
        .input-pos:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
        }
        .btn-primary {
            background: #1c64f2;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .btn-primary:hover { background: #1947b8; }
        .btn-success {
            background: #059669;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .btn-success:hover { background: #047857; }
        .btn-secondary {
            background: #374151;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .btn-secondary:hover { background: #4b5563; }
        .payment-method {
            background: #1a2332;
            border: 2px solid #374151;
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }
        .payment-method:hover {
            border-color: #4b5563;
        }
        .payment-method.selected {
            border-color: #7c3aed;
            background: rgba(124, 58, 237, 0.1);
        }
        .payment-method .icon {
            font-size: 32px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="bg-[#1F2A37] rounded-2xl shadow-2xl w-full max-w-lg border border-gray-800">
        <!-- Header -->
        <div class="flex items-center justify-between p-6 border-b border-gray-800">
            <div>
                <h2 class="text-xl font-bold">Confirmar Pago</h2>
                <p class="text-sm text-gray-500">Orden #ORD-2026-001</p>
            </div>
            <button class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-800 transition">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <!-- Content -->
        <div class="p-6">
            <!-- Order Summary -->
            <div class="bg-[#1a2332] rounded-lg p-4 mb-6">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-gray-400">Subtotal</span>
                    <span class="font-medium">$125.00</span>
                </div>
                <div class="flex justify-between items-center mb-3">
                    <span class="text-gray-400">IVA (16%)</span>
                    <span class="font-medium">$20.00</span>
                </div>
                <div class="flex justify-between items-center pt-3 border-t border-gray-700">
                    <span class="text-lg font-bold">Total a Pagar</span>
                    <span class="text-xl font-bold text-purple-400">$145.00</span>
                </div>
            </div>

            <!-- Payment Methods -->
            <div class="mb-6">
                <h3 class="text-sm font-medium text-gray-400 mb-3">Método de Pago</h3>
                <div class="grid grid-cols-3 gap-3">
                    <div class="payment-method selected" onclick="selectPayment(this)">
                        <div class="icon">💳</div>
                        <div class="text-sm font-medium">Tarjeta</div>
                    </div>
                    <div class="payment-method" onclick="selectPayment(this)">
                        <div class="icon">💵</div>
                        <div class="text-sm font-medium">Efectivo</div>
                    </div>
                    <div class="payment-method" onclick="selectPayment(this)">
                        <div class="icon">📱</div>
                        <div class="text-sm font-medium">Transferencia</div>
                    </div>
                </div>
            </div>

            <!-- Card Details (visible when card selected) -->
            <div class="mb-6">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[11px] text-gray-500 mb-1">Número de Tarjeta</label>
                        <input type="text" class="input-pos" placeholder="**** **** **** ****">
                    </div>
                    <div>
                        <label class="block text-[11px] text-gray-500 mb-1">Mes/Año</label>
                        <input type="text" class="input-pos" placeholder="MM/YY">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3 mt-3">
                    <div>
                        <label class="block text-[11px] text-gray-500 mb-1">Código de Seguridad</label>
                        <input type="text" class="input-pos" placeholder="CVV">
                    </div>
                    <div>
                        <label class="block text-[11px] text-gray-500 mb-1">Meses Meses</label>
                        <input type="text" class="input-pos" placeholder="Meses">
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="flex gap-3">
                <button class="btn-secondary flex-1">Cancelar</button>
                <button class="btn-success flex-1">
                    <span class="flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                        </svg>
                        Confirmar Pago
                    </span>
                </button>
            </div>
        </div>
    </div>

    <script>
        function selectPayment(element) {
            document.querySelectorAll('.payment-method').forEach(el => {
                el.classList.remove('selected');
            });
            element.classList.add('selected');
        }
    </script>
</body>
</html>
