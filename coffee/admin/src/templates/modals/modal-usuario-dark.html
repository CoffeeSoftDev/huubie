<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal — Usuario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .input-modal { background:#1a2332; border:1px solid #374151; border-radius:8px; padding:8px 12px; font-size:12px; color:#d1d5db; width:100%; }
        .input-modal:focus { outline:none; border-color:#7c3aed; }
        .badge-base { font-size: 11px; padding: 2px 10px; border-radius: 9999px; font-weight: 500; }
    </style>
</head>
<body class="bg-black/60 min-h-screen flex items-center justify-center p-4">

    <!-- Modal Card -->
    <div class="w-full max-w-[520px] bg-[#1F2A37] border border-gray-700 rounded-xl shadow-2xl overflow-hidden">
        <!-- Header -->
        <div class="flex items-center justify-between px-5 py-4 border-b border-gray-800">
            <h2 class="text-base font-bold">Nuevo Usuario</h2>
            <button class="text-gray-400 hover:text-white transition-colors" onclick="window.close()">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>

        <!-- Body -->
        <div class="p-5 space-y-4">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-[11px] text-gray-500 mb-1">Nombre completo</label>
                    <input type="text" class="input-modal" placeholder="Ej. Ana López" />
                </div>
                <div>
                    <label class="block text-[11px] text-gray-500 mb-1">Usuario (correo)</label>
                    <input type="email" class="input-modal" placeholder="ana@coffee.dev" />
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-[11px] text-gray-500 mb-1">Rol</label>
                    <select class="input-modal">
                        <option>Selecciona un rol...</option>
                        <option>Admin</option>
                        <option>Vendedor</option>
                        <option>Cajero</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[11px] text-gray-500 mb-1">Sucursal asignada</label>
                    <select class="input-modal">
                        <option>Selecciona sucursal...</option>
                        <option>Matriz CDMX</option>
                        <option>Guadalajara</option>
                        <option>Monterrey</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-[11px] text-gray-500 mb-1">Contraseña</label>
                <input type="password" class="input-modal" placeholder="Mínimo 5 caracteres" />
            </div>

            <div>
                <label class="block text-[11px] text-gray-500 mb-1">Sucursales (chips)</label>
                <div class="bg-[#1a2332] border border-gray-700 rounded-lg p-2 flex flex-wrap gap-2">
                    <span class="badge-base bg-blue-600 text-white flex items-center gap-1 cursor-pointer">
                        Matriz CDMX <span class="text-blue-200 hover:text-white">&times;</span>
                    </span>
                    <span class="badge-base bg-gray-700 text-gray-300 flex items-center gap-1 cursor-pointer opacity-50">
                        Guadalajara
                    </span>
                    <span class="badge-base bg-gray-700 text-gray-300 flex items-center gap-1 cursor-pointer opacity-50">
                        Monterrey
                    </span>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="flex items-center justify-end gap-2 px-5 py-4 border-t border-gray-800 bg-[#1a2332]/40">
            <button class="px-4 py-2 rounded-lg text-xs font-medium text-gray-300 hover:text-white hover:bg-[#1a2332] transition-colors">Cancelar</button>
            <button class="px-4 py-2 rounded-lg text-xs font-medium bg-blue-600 hover:bg-blue-700 text-white transition-colors">Guardar usuario</button>
        </div>
    </div>

</body>
</html>
