<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal — Confirmación</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../../app/ui/css/ui-kit.css">
  <script src="/app/src/plugins/lucide/lucide.min.js"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-[#111928] text-white">

  <!-- Backdrop -->
  <div class="cs-modal-backdrop"></div>

  <!-- Modal -->
  <div class="cs-modal" style="max-width: 420px;">
    <div class="cs-modal-body text-center py-8">
      <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-red-500/15 flex items-center justify-center">
        <i data-lucide="alert-triangle" class="w-8 h-8 text-red-400"></i>
      </div>
      <h3 class="text-xl font-semibold mb-2">¿Confirmar acción?</h3>
      <p class="text-gray-400 text-sm mb-6">Esta acción no se puede deshacer. ¿Deseas continuar?</p>
      <div class="flex justify-center gap-3">
        <button class="cs-btn cs-btn-outline" onclick="window.close()">Cancelar</button>
        <button class="cs-btn cs-btn-danger">Confirmar</button>
      </div>
    </div>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
