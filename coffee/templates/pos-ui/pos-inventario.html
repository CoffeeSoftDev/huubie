<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS — Inventario Rápido</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../../ui/css/ui-kit.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .scrollbar-thin::-webkit-scrollbar { width: 4px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
    .product-card { transition: all .15s; }
    .product-card:hover { transform: translateY(-2px); border-color: #7C3AED; }
  </style>
</head>
<body class="bg-[#111928] text-white h-screen overflow-hidden flex">

  <!-- SIDEBAR -->
  <div class="w-[56px] bg-[#0f172a] border-r border-gray-800 flex flex-col items-center py-3 gap-1 flex-shrink-0 z-20">
    <div class="w-8 h-8 rounded-lg bg-purple-600 flex items-center justify-center font-bold text-[10px] mb-3">RK</div>
    <button class="w-10 h-10 rounded-lg flex items-center justify-center text-gray-500 hover:text-gray-300" title="Cobrar" onclick="location.href='pos-main.html'">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z"/></svg>
    </button>
    <button class="w-10 h-10 rounded-lg flex items-center justify-center text-gray-500 hover:text-gray-300" title="Pedidos" onclick="location.href='pos-pedidos.html'">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
    </button>
    <button class="w-10 h-10 rounded-lg flex flex-col items-center justify-center gap-0.5 text-purple-400 border border-purple-500/30" title="Inventario">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
      <div class="w-1 h-1 rounded-full bg-purple-400"></div>
    </button>
    <div class="mt-auto space-y-1">
      <button class="w-10 h-10 rounded-lg flex items-center justify-center text-gray-500 hover:text-orange-400" title="Cierre del día">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
      </button>
      <button class="w-10 h-10 rounded-lg flex items-center justify-center text-gray-500 hover:text-gray-300" title="Configuración">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      </button>
    </div>
  </div>

  <!-- CONTENIDO -->
  <div class="flex-1 flex flex-col min-w-0">
    <div class="flex items-center justify-between px-6 py-3 bg-[#141d2b] border-b border-gray-800 flex-shrink-0">
      <div>
        <h1 class="text-lg font-bold">Inventario Rápido</h1>
        <p class="text-[11px] text-gray-500">Stock actual por producto</p>
      </div>
      <div class="flex items-center gap-3">
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          </span>
          <input id="searchInv" type="text" placeholder="Buscar producto..." class="cs-input pl-9 w-64 text-xs" oninput="renderInventory()">
        </div>
        <select id="filterStatus" class="cs-select text-xs" onchange="renderInventory()">
          <option value="Todos">Todos los estados</option>
          <option value="OK">Stock OK</option>
          <option value="Bajo">Stock Bajo</option>
          <option value="Agotado">Agotado</option>
        </select>
      </div>
    </div>

    <!-- KPIs -->
    <div class="grid grid-cols-4 gap-3 px-6 py-4 flex-shrink-0">
      <div class="bg-[#1F2A37] rounded-xl p-3 border border-gray-700">
        <p class="text-[10px] text-gray-500 uppercase tracking-wider">Total Productos</p>
        <p class="text-xl font-extrabold mt-1" id="kpiTotal">0</p>
      </div>
      <div class="bg-[#1F2A37] rounded-xl p-3 border border-green-500/30">
        <p class="text-[10px] text-green-500 uppercase tracking-wider">Stock OK</p>
        <p class="text-xl font-extrabold text-green-400 mt-1" id="kpiOk">0</p>
      </div>
      <div class="bg-[#1F2A37] rounded-xl p-3 border border-yellow-500/30">
        <p class="text-[10px] text-yellow-500 uppercase tracking-wider">Stock Bajo</p>
        <p class="text-xl font-extrabold text-yellow-400 mt-1" id="kpiLow">0</p>
      </div>
      <div class="bg-[#1F2A37] rounded-xl p-3 border border-red-500/30">
        <p class="text-[10px] text-red-500 uppercase tracking-wider">Agotado</p>
        <p class="text-xl font-extrabold text-red-400 mt-1" id="kpiOut">0</p>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto px-6 pb-6 scrollbar-thin">
      <div id="inventoryGrid" class="grid grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-3">
        <!-- JS renderiza -->
      </div>
    </div>
  </div>

  <script>
    const inventory = [
      { id:1, name:'Pastel 3 Leches Choco', price:700, stock:3, min:5, max:20, emoji:'🎂', cat:'Pasteles' },
      { id:2, name:'Carlos V', price:390, stock:8, min:5, max:20, emoji:'🍰', cat:'Pasteles' },
      { id:3, name:'Pay de Fresas', price:350, stock:12, min:5, max:25, emoji:'🍓', cat:'Pasteles' },
      { id:4, name:'Choco Aleman', price:600, stock:8, min:3, max:15, emoji:'🍫', cat:'Pasteles' },
      { id:5, name:'Choco Forest', price:600, stock:5, min:3, max:15, emoji:'🌲', cat:'Premium' },
      { id:6, name:'Cupcake', price:55, stock:0, min:10, max:50, emoji:'🧁', cat:'Cupcakes' },
      { id:7, name:'3 Leches Fresa', price:650, stock:6, min:5, max:20, emoji:'🍰', cat:'Pasteles' },
      { id:8, name:'Choco Roll', price:700, stock:4, min:3, max:15, emoji:'☕', cat:'Premium' },
      { id:9, name:'Decorated', price:650, stock:2, min:3, max:10, emoji:'🎀', cat:'Premium' },
      { id:10, name:'Sponge Cake', price:600, stock:9, min:3, max:15, emoji:'🧽', cat:'Pasteles' },
      { id:11, name:'Strawberry Pie', price:600, stock:7, min:3, max:15, emoji:'🍓', cat:'Pasteles' },
      { id:12, name:'Galleta Choco', price:45, stock:24, min:10, max:60, emoji:'🍪', cat:'Galletas' },
      { id:13, name:'Blueberry Cake', price:580, stock:3, min:3, max:15, emoji:'🫐', cat:'Premium' },
      { id:14, name:'Limon Cake', price:520, stock:10, min:5, max:20, emoji:'🍋', cat:'Pasteles' },
      { id:15, name:'Cafe Americano', price:45, stock:50, min:20, max:100, emoji:'☕', cat:'Cafés' },
      { id:16, name:'Capuccino', price:55, stock:40, min:20, max:100, emoji:'☕', cat:'Cafés' },
    ];

    function getStatus(item) {
      if (item.stock === 0) return { label: 'Agotado', cls: 'cs-badge-danger', bar: 'bg-red-500', pct: 0 };
      if (item.stock <= item.min) return { label: 'Bajo', cls: 'cs-badge-warning', bar: 'bg-yellow-500', pct: Math.min(100, (item.stock/item.max)*100) };
      return { label: 'OK', cls: 'cs-badge-success', bar: 'bg-green-500', pct: Math.min(100, (item.stock/item.max)*100) };
    }

    function renderInventory() {
      const grid = document.getElementById('inventoryGrid');
      const q = document.getElementById('searchInv').value.toLowerCase();
      const f = document.getElementById('filterStatus').value;
      grid.innerHTML = '';

      let ok=0, low=0, out=0;
      const filtered = inventory.filter(p => {
        const s = getStatus(p);
        if (s.label==='OK') ok++; else if (s.label==='Bajo') low++; else out++;
        const matchSearch = p.name.toLowerCase().includes(q);
        const matchStatus = f === 'Todos' || s.label === f;
        return matchSearch && matchStatus;
      });

      document.getElementById('kpiTotal').textContent = inventory.length;
      document.getElementById('kpiOk').textContent = ok;
      document.getElementById('kpiLow').textContent = low;
      document.getElementById('kpiOut').textContent = out;

      filtered.forEach(p => {
        const s = getStatus(p);
        const el = document.createElement('div');
        el.className = 'product-card bg-[#1F2A37] rounded-xl p-3 border border-gray-700 flex flex-col gap-2';
        el.innerHTML = `
          <div class="flex items-center justify-between">
            <div class="w-10 h-10 rounded-lg bg-purple-500/10 flex items-center justify-center text-lg">${p.emoji}</div>
            <span class="cs-badge ${s.cls}">${s.label}</span>
          </div>
          <div>
            <p class="text-xs font-semibold truncate">${p.name}</p>
            <p class="text-[10px] text-gray-500">${p.cat}</p>
          </div>
          <div class="mt-auto space-y-1">
            <div class="flex justify-between text-xs">
              <span class="text-gray-400">Stock</span>
              <span class="font-bold ${s.label==='Agotado'?'text-red-400':s.label==='Bajo'?'text-yellow-400':'text-green-400'}">${p.stock}</span>
            </div>
            <div class="h-1.5 bg-gray-700 rounded-full overflow-hidden">
              <div class="${s.bar} h-full rounded-full" style="width:${s.pct}%"></div>
            </div>
            <div class="flex justify-between text-[10px] text-gray-500">
              <span>Min: ${p.min}</span>
              <span>Max: ${p.max}</span>
            </div>
            <div class="flex justify-between text-xs font-semibold pt-1 border-t border-gray-700">
              <span class="text-gray-400">Precio</span>
              <span>$${p.price.toLocaleString()}</span>
            </div>
          </div>
        `;
        grid.appendChild(el);
      });
    }

    renderInventory();
  </script>
</body>
</html>
