<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grupo Varoch · Iniciar sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           Grupo Varoch · Login — replica del glass-login de inventory
           recoloreado a la paleta institucional Coffee-Varoch.
           Estructura: blobs ambientales + placa flotante + glass card.
           ============================================================ */
        :root {
            --cv-bg-base:      #F2F5F9;
            --cv-text:         #0F172A;
            --cv-text-soft:    #1F2937;
            --cv-text-muted:   #64748B;
            --cv-text-mute2:   #94A3B8;
            --cv-border:       #E2E8F0;
            --cv-primary:      #003360;   /* AZUL institucional Varoch */
            --cv-primary-soft: #00264A;
            --cv-action:       #2563EB;
            --cv-accent:       #60A5FA;
            --cv-middle:       #AAD3EB;
            --cv-primary-tint: rgba(0, 51, 96, 0.10);
            --cv-danger:       #9E1B32;
            --cv-danger-bg:    #FDECEA;
            --cv-danger-border:#F3C0BD;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        .login-body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 5.5rem 1rem 2rem;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            background: var(--cv-bg-base);
            color: var(--cv-text-soft);
        }

        /* ---------- Ambient blobs ---------- */
        @keyframes blob-morph {
            0%, 100% { transform: translate(0, 0) scale(1);   border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            25%      { transform: translate(20px, -30px) scale(1.05); border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
            50%      { transform: translate(-20px, 10px) scale(0.95); border-radius: 50% 60% 30% 60% / 30% 40% 70% 60%; }
            75%      { transform: translate(10px, 20px) scale(1.02);  border-radius: 40% 60% 60% 40% / 60% 30% 40% 70%; }
        }
        .blob {
            position: fixed;
            filter: blur(70px);
            opacity: 0.22;
            animation: blob-morph 8s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        .blob-1 { width: 380px; height: 380px; background: #003360; top: -80px; left: -80px; animation-delay: 0s; }
        .blob-2 { width: 320px; height: 320px; background: #2563EB; bottom: -60px; right: -60px; animation-delay: 2s; opacity: 0.16; }
        .blob-3 { width: 260px; height: 260px; background: #AAD3EB; top: 40%; left: 40%; animation-delay: 4s; opacity: 0.16; }

        /* ---------- Card wrapper ---------- */
        .login-card-wrap { width: 100%; max-width: 420px; margin: auto; position: relative; z-index: 10; }

        /* ---------- Placa institucional flotante (equivalente a la taza de inventory) ---------- */
        .brand-float { position: absolute; left: 50%; top: -60px; transform: translateX(-50%); z-index: 20; }
        .brand-badge {
            width: 108px; height: 108px; border-radius: 26px;
            background: linear-gradient(135deg, #003360 0%, #2563EB 100%);
            box-shadow: 0 18px 40px -8px rgba(0, 51, 96, .55);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 800; font-size: 34px; letter-spacing: 1px;
            border: 3px solid rgba(255,255,255,.85);
        }

        /* ---------- Glass card ---------- */
        .glass-card {
            background: rgba(255, 255, 255, 0.80);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 51, 96, 0.08);
            box-shadow: 0 20px 40px -10px rgba(15, 23, 42, 0.16);
            border-radius: 1rem;
            padding: 4.75rem 2rem 2rem;
        }

        /* ---------- Header ---------- */
        .login-header { text-align: center; margin-bottom: 2rem; }
        .login-header h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; }
        .text-gradient {
            background: linear-gradient(135deg, #003360 0%, #2563EB 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .login-subtitle { font-size: 12px; margin-top: 0.25rem; font-weight: 500; color: var(--cv-text-muted); }

        /* ---------- Form ---------- */
        .login-form { display: flex; flex-direction: column; gap: 1.25rem; }
        .form-group { display: flex; flex-direction: column; }
        .vsr-label {
            display: block; font-size: 11px; color: var(--cv-text-muted);
            margin-bottom: 6px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
        }
        .input-wrap { position: relative; }
        .input-icon {
            position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
            width: 1rem; height: 1rem; color: var(--cv-text-mute2); pointer-events: none;
        }
        .glass-input {
            width: 100%; background: rgba(255, 255, 255, 0.7);
            border: 1px solid var(--cv-border); color: var(--cv-text);
            border-radius: 10px; padding: 11px 14px 11px 42px; font-size: 14px; transition: all .2s ease;
        }
        .glass-input.has-eye { padding-right: 42px; }
        .glass-input::placeholder { color: var(--cv-text-mute2); }
        .glass-input:focus {
            outline: none; border-color: var(--cv-action);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); background: rgba(255, 255, 255, 0.9);
        }
        .glass-input.is-invalid { border-color: var(--cv-danger); }

        /* ---------- Eye toggle ---------- */
        .eye-icon {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: var(--cv-text-mute2); display: flex; align-items: center; padding: 4px; transition: color .15s;
        }
        .eye-icon:hover { color: var(--cv-primary); }
        .eye-icon svg { width: 18px; height: 18px; }

        /* ---------- Login error banner ---------- */
        .login-error {
            display: none; align-items: center; gap: 10px;
            background: var(--cv-danger-bg); color: var(--cv-danger);
            border: 1px solid var(--cv-danger-border); border-radius: 8px;
            padding: 12px 14px; font-size: 13px; line-height: 1.4;
        }
        .login-error.show { display: flex; }
        .login-error-icon { font-size: 16px; flex-shrink: 0; }

        /* ---------- Submit button ---------- */
        .btn-glow {
            background: linear-gradient(135deg, #003360 0%, #2563EB 100%);
            color: #fff; border: none; border-radius: 10px; padding: 12px 16px;
            font-weight: 600; font-size: 14px; cursor: pointer; width: 100%; margin-top: 0.25rem;
            transition: all .2s ease; box-shadow: 0 4px 20px rgba(0, 51, 96, 0.35);
        }
        .btn-glow:hover { box-shadow: 0 6px 28px rgba(0, 51, 96, 0.50); transform: translateY(-1px); }
        .btn-glow:active { transform: scale(0.985) translateY(0); }

        /* ---------- Extras ---------- */
        .login-forgot { text-align: center; margin-top: 1rem; }
        .login-forgot a { font-size: 12px; color: var(--cv-action); font-weight: 500; text-decoration: none; cursor: pointer; }
        .login-forgot a:hover { text-decoration: underline; }
        .login-copyright { text-align: center; font-size: 11px; margin-top: 1.5rem; font-weight: 500; color: var(--cv-text-mute2); }

        @media (max-width: 480px) {
            .glass-card { padding: 4.5rem 1.5rem 1.75rem; }
            .blob { opacity: 0.14; }
        }
    </style>
</head>

<body class="login-body">

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="login-card-wrap">

        <div class="brand-float">
            <div class="brand-badge">GV</div>
        </div>

        <div class="glass-card">
            <div class="login-header">
                <h1 class="text-gradient">Grupo Varoch</h1>
                <p class="login-subtitle">ERP corporativo · Acceso institucional</p>
            </div>

            <form id="form_login" novalidate class="login-form" onsubmit="return false;">

                <div id="login-error" class="login-error" role="alert">
                    <span class="login-error-icon">⚠</span>
                    <span id="login-error-text">Usuario y/o clave incorrectos.</span>
                </div>

                <div class="form-group">
                    <label class="vsr-label" for="usuario">Correo o usuario</label>
                    <div class="input-wrap">
                        <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
                        <input type="text" class="glass-input" name="usser" id="usuario" placeholder="Tu correo o usuario" required autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label class="vsr-label" for="clave">Contraseña</label>
                    <div class="input-wrap">
                        <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>
                        <input type="password" class="glass-input has-eye" name="keey" id="clave" placeholder="••••••••" required autocomplete="current-password">
                        <span class="eye-icon" id="btnEye">
                            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        </span>
                    </div>
                </div>

                <button type="submit" class="btn-glow">Iniciar sesión</button>

                <div class="login-forgot">
                    <a id="btnForgot">¿Olvidaste tu contraseña?</a>
                </div>
            </form>
        </div>

        <p class="login-copyright">Grupo Varoch · ERP-GV © <span id="year">2026</span></p>
    </div>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
        // Toggle mostrar/ocultar contraseña (replica el patron #btnEye de inventory)
        const eyeOpen = '<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>';
        const eyeOff  = '<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.243 4.243L9.88 9.88"/></svg>';
        const btnEye = document.getElementById('btnEye');
        const clave  = document.getElementById('clave');
        btnEye.addEventListener('click', () => {
            if (clave.type === 'password') { clave.type = 'text'; btnEye.innerHTML = eyeOff; }
            else { clave.type = 'password'; btnEye.innerHTML = eyeOpen; }
        });

        const formLogin   = document.getElementById('form_login');
        const loginError  = document.getElementById('login-error');
        const usuario     = document.getElementById('usuario');
        formLogin.addEventListener('submit', () => {
            if (!usuario.value.trim() || !clave.value.trim()) {
                document.getElementById('login-error-text').textContent = 'Ingresa tu usuario y contraseña.';
                loginError.classList.add('show');
                return;
            }
            loginError.classList.remove('show');
            const btn = formLogin.querySelector('.btn-glow');
            btn.disabled = true;
            btn.textContent = 'Ingresando...';
            setTimeout(() => { window.location.href = 'gv-navbar.html'; }, 600);
        });
    </script>
</body>
</html>
