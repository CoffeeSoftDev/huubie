<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo Varoch · Asignar permiso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #F2F5F9; }
        .cv-modal-overlay { position:fixed; inset:0; background:rgba(15,23,42,.55); backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; z-index:100; padding:16px; }
        .cv-modal { background:#FFFFFF; border:1px solid #E2E8F0; border-radius:14px; box-shadow:0 20px 60px rgba(0,0,0,.25); width:100%; max-width:520px; max-height:92vh; overflow:hidden; display:flex; flex-direction:column; }
        .cv-modal-header { padding:16px 20px; border-bottom:1px solid #E2E8F0; display:flex; align-items:center; justify-content:space-between; }
        .cv-modal-body { padding:18px 20px; overflow-y:auto; }
        .cv-modal-footer { padding:14px 20px; border-top:1px solid #E2E8F0; display:flex; gap:8px; justify-content:flex-end; background:#F8FAFC; }
        .cv-label { font-size:11px; font-weight:600; letter-spacing:.03em; text-transform:uppercase; color:#475569; margin-bottom:5px; display:block; }
        .cv-select { width:100%; background:#F8FAFC; border:1px solid #CBD5E1; border-radius:8px; padding:9px 12px; font-size:13px; color:#0F172A; outline:none; transition:.15s; }
        .cv-select:focus { border-color:#2563EB; box-shadow:0 0 0 3px rgba(37,99,235,.15); }
        .cv-btn { padding:9px 18px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; border:1px solid transparent; transition:.15s; }
        .cv-btn-primary { background:#003360; color:#fff; }
        .cv-btn-primary:hover { background:#00264A; }
        .cv-btn-ghost { background:transparent; color:#64748B; border-color:#E2E8F0; }
        .cv-btn-ghost:hover { background:#F1F5F9; color:#0F172A; }
        .modal-close { color:#94A3B8; cursor:pointer; transition:.15s; }
        .modal-close:hover { color:#0F172A; }
        .perm-check { display:flex; align-items:center; justify-content:space-between; padding:11px 13px; border:1px solid #E2E8F0; border-radius:10px; background:#F8FAFC; }
        .sw { position:relative; display:inline-block; width:38px; height:20px; }
        .sw input { opacity:0; width:0; height:0; }
        .sw-slider { position:absolute; inset:0; background:#CBD5E1; border-radius:9999px; transition:.2s; cursor:pointer; }
        .sw-slider::before { content:""; position:absolute; height:14px; width:14px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.2s; box-shadow:0 1px 3px rgba(0,0,0,.2); }
        .sw input:checked + .sw-slider { background:#2563EB; }
        .sw input:checked + .sw-slider::before { transform:translateX(18px); }
        .sw.sw-view input:checked + .sw-slider { background:#7AAB20; }
    </style>
</head>
<body>
    <div class="cv-modal-overlay">
        <div class="cv-modal">
            <div class="cv-modal-header">
                <div class="flex items-center gap-2.5">
                    <div class="w-9 h-9 rounded-lg flex items-center justify-center" style="background:rgba(0,51,96,.1);color:#003360;"><i data-lucide="key-round" class="w-5 h-5"></i></div>
                    <div>
                        <h3 class="text-[15px] font-bold" style="color:#003360;">Asignar permiso a directorio</h3>
                        <p class="text-[11px] text-slate-400">Perfil: <b class="text-slate-600">TICS root</b></p>
                    </div>
                </div>
                <span class="modal-close" onclick="window.close()"><i data-lucide="x" class="w-5 h-5"></i></span>
            </div>

            <div class="cv-modal-body space-y-4">
                <div>
                    <label class="cv-label">Módulo</label>
                    <select class="cv-select" id="selModulo">
                        <option>CAPITAL HUMANO</option>
                        <option>CONTABILIDAD</option>
                        <option>TESORERIA</option>
                        <option>KPI</option>
                    </select>
                </div>
                <div>
                    <label class="cv-label">Directorio</label>
                    <select class="cv-select">
                        <option>Colaboradores</option>
                        <option>Incidencias</option>
                        <option>Anticipos</option>
                        <option>Nóminas</option>
                        <option>Reclutamiento</option>
                    </select>
                </div>

                <div>
                    <label class="cv-label">Acciones permitidas</label>
                    <div class="space-y-2">
                        <div class="perm-check">
                            <div class="flex items-center gap-2"><i data-lucide="eye" class="w-4 h-4" style="color:#7AAB20;"></i><span class="text-[13px] text-slate-700 font-medium">Ver</span></div>
                            <label class="sw sw-view"><input type="checkbox" checked><span class="sw-slider"></span></label>
                        </div>
                        <div class="perm-check">
                            <div class="flex items-center gap-2"><i data-lucide="plus-circle" class="w-4 h-4" style="color:#2563EB;"></i><span class="text-[13px] text-slate-700 font-medium">Escribir</span></div>
                            <label class="sw"><input type="checkbox" checked><span class="sw-slider"></span></label>
                        </div>
                        <div class="perm-check">
                            <div class="flex items-center gap-2"><i data-lucide="pencil" class="w-4 h-4" style="color:#2563EB;"></i><span class="text-[13px] text-slate-700 font-medium">Editar</span></div>
                            <label class="sw"><input type="checkbox"><span class="sw-slider"></span></label>
                        </div>
                        <div class="perm-check">
                            <div class="flex items-center gap-2"><i data-lucide="printer" class="w-4 h-4" style="color:#2563EB;"></i><span class="text-[13px] text-slate-700 font-medium">Imprimir</span></div>
                            <label class="sw"><input type="checkbox" checked><span class="sw-slider"></span></label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="cv-modal-footer">
                <button class="cv-btn cv-btn-ghost" onclick="window.close()">Cancelar</button>
                <button class="cv-btn cv-btn-primary flex items-center gap-1.5"><i data-lucide="check" class="w-4 h-4"></i> Asignar permiso</button>
            </div>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
