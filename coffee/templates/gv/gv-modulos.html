<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo Varoch · Módulos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #F2F5F9; color: #0F172A; }
        .font-poppins { font-family: 'Poppins', sans-serif; }

        /* ── Navbar slim (mismo look que gv-navbar). El selector de UDN lo inyecta gv-navbar-branch.js ── */
        .navbar-main { background:#FFFFFF; border-bottom:1px solid rgba(0,51,96,.18) !important; }
        .nav-logo { width:36px; height:36px; border-radius:10px; background:linear-gradient(135deg,#003360 0%,#2563EB 100%); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:13px; box-shadow:0 4px 12px rgba(0,51,96,.35); flex-shrink:0; }
        .navbar-title { font-size:15px; font-weight:700; color:#111827; line-height:1.15; }
        .navbar-subtitle { font-size:10px; color:#94A3B8; letter-spacing:.12em; text-transform:uppercase; }
        .nav-user-pill { padding:4px 8px 4px 13px; border:1px solid transparent; border-left:1px solid #E2E8F0; border-radius:8px; transition:all .15s ease; cursor:pointer; }
        .nav-user-pill:hover { background:#F1F5F9; border-color:#E2E8F0; }
        .nav-user-name { font-size:13px; font-weight:600; color:#111827; }
        .nav-user-rol  { font-size:11px; color:#64748B; }
        .nav-chevron { color:#94A3B8; transition:transform .2s ease; }
        .nav-avatar { width:38px; height:38px; border-radius:9999px; background:#003360; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:13px; box-shadow:0 4px 12px rgba(0,51,96,.32); }

        /* ── Buscador ── */
        .mod-search { background:#FFFFFF; border:1px solid #E2E8F0; }
        .mod-search:focus { outline:none; border-color:#2563EB; box-shadow:0 0 0 3px rgba(37,99,235,.15); }
        .mod-kbd { background:#F1F5F9; color:#64748B; }

        /* ── ModuleCard (paleta institucional #003360) ── */
        .module-card { background:#FFFFFF; border:1px solid #E2E8F0; border-radius:14px; box-shadow:0 2px 8px rgba(15,23,42,.05); cursor:pointer; transition:.2s; }
        .module-card:hover { border-color:#2563EB; transform:translateY(-3px); box-shadow:0 12px 30px rgba(37,99,235,.15); }
        .module-icon { width:44px; height:44px; border-radius:11px; background:rgba(0,51,96,.10); color:#003360; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .module-badge { font-size:10px; font-weight:700; letter-spacing:.04em; padding:4px 10px; border-radius:9999px; background:rgba(0,51,96,.10); color:#003360; border:1px solid rgba(0,51,96,.22); }
        .module-badge-leaf { background:rgba(122,171,32,.15); color:#5d8418; border-color:rgba(122,171,32,.35); }
        .module-foot { color:#003360; opacity:0; transform:translateY(4px); transition:all .2s ease; }
        .module-card:hover .module-foot { opacity:1; transform:translateY(0); }

        /* Card "Volver" — invertida (fondo azul institucional) */
        .module-card-back { background:linear-gradient(135deg,#003360 0%,#00264A 100%); border-color:#003360; }
        .module-card-back .module-icon { background:rgba(255,255,255,.16); color:#fff; }
        .module-card-back h3, .module-card-back p { color:#fff !important; }
        .module-card-back:hover { border-color:#2563EB; }
        .module-card-back .module-foot { color:#BFD3E6; }

        .section-h2 { font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:#64748B; }

        /* Toast */
        #toast { position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(20px); opacity:0; pointer-events:none; transition:all .25s ease; background:#003360; color:#fff; padding:10px 18px; border-radius:12px; font-size:13px; font-weight:600; box-shadow:0 12px 30px rgba(0,51,96,.4); z-index:80; display:flex; align-items:center; gap:8px; }
        #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    </style>
</head>

<body class="min-h-screen flex flex-col">

    <!-- ══════════ NAVBAR ══════════ -->
    <nav class="navbar-main w-full px-4 py-2 h-16 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="nav-logo">GV</div>
            <div class="flex flex-col leading-tight">
                <span class="navbar-title">Grupo Varoch</span>
                <span class="navbar-subtitle">Corporativo Varoch</span>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button class="nav-user-pill flex items-center gap-2.5">
                <div class="nav-avatar">RA</div>
                <div class="hidden sm:flex flex-col items-start leading-tight">
                    <span class="nav-user-name">Rosa A.</span>
                    <span class="nav-user-rol">Administradora</span>
                </div>
                <i data-lucide="chevron-down" class="nav-chevron w-4 h-4"></i>
            </button>
        </div>
    </nav>

    <!-- ══════════ CONTENIDO ══════════ -->
    <main class="flex-1">
        <div class="w-full max-w-6xl mx-auto px-6 py-8">

            <!-- Breadcrumb -->
            <nav aria-label="breadcrumb" class="mb-4">
                <ol id="crumbs" class="flex items-center gap-2 text-xs">
                    <li class="uppercase tracking-wide text-slate-400">Corporativo</li>
                    <li class="text-slate-300">/</li>
                    <li class="font-bold" style="color:#003360;">Módulos</li>
                </ol>
            </nav>

            <!-- Header: saludo + buscador -->
            <div class="w-full flex items-start justify-between gap-4 flex-wrap mb-6">
                <div class="min-w-0">
                    <h2 id="modTitle" class="text-xl md:text-2xl font-semibold leading-tight font-poppins" style="color:#003360;"></h2>
                    <p id="modSubtitle" class="text-xs md:text-sm mt-1 text-slate-500"></p>
                </div>
                <div class="relative flex-shrink-0">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                        <i data-lucide="search" class="w-4 h-4"></i>
                    </span>
                    <input id="modSearch" type="text" placeholder="Buscar módulo..."
                        class="mod-search w-full md:w-[360px] pl-9 pr-14 py-2 rounded-xl text-sm text-slate-800 placeholder-slate-400" />
                    <kbd class="mod-kbd absolute right-2 top-1/2 -translate-y-1/2 text-[10px] font-mono px-1.5 py-0.5 rounded">Ctrl+K</kbd>
                </div>
            </div>

            <!-- Grid de tarjetas -->
            <div id="modGrid" class="w-full grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-x-3 gap-y-6 content-start auto-rows-min"></div>

            <p class="text-center text-[11px] text-slate-400 mt-12">Grupo Varoch · ERP-GV · Navegador de módulos con look inventory · paleta <b>#003360</b></p>
        </div>
    </main>

    <div id="toast"><i data-lucide="info" class="w-4 h-4"></i><span id="toastMsg"></span></div>

    <script>
    // ───────────────────────────────────────────────────────────────────────
    //  Datos de ejemplo: módulos GV con sus submódulos.
    //  Nivel 1: cards de MÓDULO. Click con submódulos -> abre nivel 2.
    //  Nivel 2: cards de SUBMÓDULO. Click -> navega a su route (o toast si es demo).
    //  route con valor real apunta a templates gv ya existentes.
    // ───────────────────────────────────────────────────────────────────────
    const SAMPLE_MODULES = [
        {
            id: 'inicio', name: 'Inicio', icon: 'layout-dashboard',
            description: 'Tablero de inicio del corporativo con accesos rápidos y rail de navegación.',
            route: 'gv-inicio.html',
            submodules: []
        },
        {
            id: 'contabilidad', name: 'Contabilidad', icon: 'calculator',
            description: 'Pólizas, catálogo de cuentas y estados financieros.',
            route: 'gv-contabilidad.html',
            submodules: [
                { name: 'Pólizas', icon: 'file-text', description: 'Captura y consulta de pólizas contables.' },
                { name: 'Catálogo de cuentas', icon: 'list-tree', description: 'Estructura contable por naturaleza y nivel.' },
                { name: 'Estados financieros', icon: 'bar-chart-4', description: 'Balance general y estado de resultados.' },
                { name: 'Conciliación bancaria', icon: 'git-compare', description: 'Cruce de movimientos banco vs. contabilidad.' },
            ]
        },
        {
            id: 'kpi', name: 'Indicadores · KPI', icon: 'bar-chart-3',
            description: 'Tableros de ventas, costos, productividad y rotación.',
            route: 'gv-kpi.html',
            submodules: [
                { name: 'Ventas', icon: 'shopping-cart', description: 'Ventas por UDN, categoría y periodo.' },
                { name: 'Costos', icon: 'percent', description: 'Evolución del % de costo por unidad.' },
                { name: 'Productividad', icon: 'activity', description: 'Rendimiento operativo del personal.' },
                { name: 'Rotación', icon: 'refresh-cw', description: 'Rotación de inventario y personal.' },
            ]
        },
        {
            id: 'costos', name: 'Costos · Costsys', icon: 'chef-hat',
            description: 'Costeo de recetas por UDN, clasificación, costo potencial y proyección.',
            route: 'costsys coffee/costsys-coffee.html',
            submodules: [
                { name: 'Ingredientes', icon: 'carrot', description: 'Catálogo con precio por unidad autocalculado.', route: 'costsys/costsys-ingredientes.html' },
                { name: 'Subrecetas', icon: 'soup', description: 'Composición, foto y costo por unidad.', route: 'costsys/costsys-subrecetas.html' },
                { name: 'Recetas', icon: 'utensils-crossed', description: 'Costeo automático y estados Borrador / Activa.', route: 'costsys/costsys-recetas.html' },
                { name: 'Costo potencial', icon: 'table-2', description: 'Tablero mensual con semáforos y precio propuesto.', route: 'costsys/costsys-costo-potencial.html' },
                { name: 'Proyección', icon: 'calendar-clock', description: 'Ejercicio mensual actual vs. propuesto.', route: 'costsys/costsys-proyeccion.html' },
                { name: 'Tablero de control', icon: 'gauge', description: 'Rangos de semáforo % costo / MC por clasificación.', route: 'costsys/costsys-tablero-control.html' },
                { name: 'Administrador', icon: 'sliders-horizontal', description: 'Catálogos base: unidades, marcas, proveedores.', route: 'costsys/costsys-admin.html' },
            ]
        },
    ];

    const $  = (sel) => document.querySelector(sel);
    const grid = $('#modGrid');
    let currentCards = [];   // cards actualmente renderizadas (para el buscador)

    // Saludo según la hora.
    function greeting() {
        const h = new Date().getHours();
        return h < 12 ? 'Buen día' : h < 19 ? 'Buena tarde' : 'Buena noche';
    }

    function toast(msg) {
        $('#toastMsg').textContent = msg;
        const t = $('#toast');
        t.classList.add('show');
        clearTimeout(window.__toastT);
        window.__toastT = setTimeout(() => t.classList.remove('show'), 2200);
    }

    // Construye una card (módulo o submódulo) a partir de un objeto item.
    //   item: { titulo, descripcion, icon, badge, footer, back, onClick }
    function cardHTML(item, idx) {
        const iconBox = `<div class="module-icon"><i data-lucide="${item.icon || 'layout-grid'}" class="w-5 h-5"></i></div>`;
        const badge = item.badge
            ? `<span class="module-badge ${item.badge.leaf ? 'module-badge-leaf' : ''}">${item.badge.text}</span>`
            : '';
        const foot = item.footer
            ? `<div class="module-foot mt-2 flex items-center gap-1 text-xs font-semibold"><span>${item.footer}</span><i data-lucide="arrow-right" class="w-3.5 h-3.5"></i></div>`
            : '';
        return `
            <div class="module-card ${item.back ? 'module-card-back' : ''} h-[168px] p-4 flex flex-col"
                 data-idx="${idx}" data-title="${(item.titulo || '').toLowerCase()}">
                <div class="flex justify-between items-start">${iconBox}${badge}</div>
                <div class="mt-auto pt-2 flex flex-col gap-1">
                    <h3 class="text-sm md:text-base font-semibold font-poppins leading-tight" style="color:#003360;">${item.titulo || ''}</h3>
                    <p class="text-xs leading-snug text-slate-500 line-clamp-2">${item.descripcion || ''}</p>
                    ${foot}
                </div>
            </div>`;
    }

    // Renderiza una lista de cards y engancha su onClick.
    function renderCards(cards, title, subtitle) {
        currentCards = cards;
        $('#modTitle').innerHTML    = title;
        $('#modSubtitle').textContent = subtitle;
        grid.innerHTML = cards.map((c, i) => cardHTML(c, i)).join('');
        $('#modSearch').value = '';
        if (window.lucide) lucide.createIcons();
    }

    // ── Módulos: cada card navega directo a su página. ──
    function showModules() {
        const cards = SAMPLE_MODULES.map((m) => ({
            titulo: m.name,
            descripcion: m.description,
            icon: m.icon,
            badge: m.submodules.length
                ? { text: `${m.submodules.length} SECCIÓN${m.submodules.length !== 1 ? 'ES' : ''}` }
                : null,
            footer: 'Abrir módulo',
            onClick: () => navigate(m.route, m.name),
        }));
        renderCards(cards, `¡${greeting()}, Rosy! 👋`, 'Elige un módulo para abrirlo.');
    }

    // Navega a un route o muestra toast si es demo sin destino.
    function navigate(route, name) {
        if (route) window.location.href = route;
        else toast(`«${name}» — pantalla en construcción`);
    }

    // Delegación de click sobre las cards.
    grid.addEventListener('click', (e) => {
        const card = e.target.closest('.module-card');
        if (!card) return;
        const item = currentCards[parseInt(card.dataset.idx, 10)];
        if (item && typeof item.onClick === 'function') item.onClick();
    });

    // Buscador (filtra por título, igual que moduleCard.js).
    $('#modSearch').addEventListener('input', (e) => {
        const q = e.target.value.trim().toLowerCase();
        grid.querySelectorAll('.module-card').forEach((c) => {
            const t = c.dataset.title || '';
            c.classList.toggle('hidden', !!q && !t.includes(q));
        });
    });
    document.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
            e.preventDefault();
            $('#modSearch').focus();
        }
    });

    // Arranque.
    showModules();
    lucide.createIcons();
    </script>

    <script src="gv-navbar-theme.js"></script>
    <script src="gv-navbar-branch.js"></script>
    <script src="gv-navbar-score.js"></script>
    <script src="gv-navbar-user.js"></script>
</body>
</html>
