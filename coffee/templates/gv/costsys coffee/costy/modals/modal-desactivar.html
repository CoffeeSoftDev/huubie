<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desactivar Receta · CoffeeSoft</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', system-ui, sans-serif; background:rgba(0,0,0,.6); color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .input-modal { background:#1a2332; border:1px solid #374151; border-radius:8px; padding:8px 12px; font-size:12px; color:#d1d5db; width:100%; }
  .card-demo { background:#1F2A37; border:1px solid rgba(55,65,81,.6); border-radius:12px; padding:1.5rem; }
</style>
</head>
<body>

<div class="card-demo w-[480px] max-w-[90vw]">
  <!-- Header -->
  <div class="flex items-start gap-3 mb-4">
    <div class="w-10 h-10 rounded-full bg-red-500/15 flex items-center justify-center flex-shrink-0">
      <svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
    </div>
    <div class="flex-1">
      <h3 class="text-sm font-bold mb-1">¿Desea desactivar esta receta?</h3>
      <p class="text-[12px] text-gray-500">Ya no aparecerá en el Costo Potencial ni estará disponible para nuevas vinculaciones.</p>
    </div>
    <button onclick="window.close()" class="text-gray-500 hover:text-gray-400 transition">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
  </div>

  <!-- Info receta -->
  <div class="bg-header rounded-lg p-3 mb-4 border border-gray-700" style="background:#141d2b;">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-lg bg-gray-700 overflow-hidden">
        <img src="https://placehold.co/40x40/7c3aed/fff?text=PB" alt="" class="w-full h-full object-cover">
      </div>
      <div>
        <p class="text-[12px] font-medium">Pasta Boloñesa</p>
        <p class="text-[10px] text-gray-500">Restaurante Centro · Platos Fuertes</p>
      </div>
    </div>
  </div>

  <!-- Alerta Softrestaurant -->
  <div class="bg-orange-500/10 border border-orange-500/30 rounded-lg p-3 mb-5 flex items-start gap-2">
    <svg class="w-4 h-4 text-orange-400 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    <p class="text-[11px] text-orange-400">Esta receta está vinculada a <span class="font-medium">Pasta Bol. SR</span> en Softrestaurant. Al desactivarla, la vinculación quedará pausada.</p>
  </div>

  <!-- Botones -->
  <div class="flex items-center justify-end gap-2">
    <button onclick="window.close()" class="px-4 py-2 rounded-lg border border-gray-700 hover:border-gray-600 text-[12px] text-gray-400 transition">Cancelar</button>
    <button class="px-4 py-2 rounded-lg bg-red-600 hover:bg-red-700 text-[12px] font-medium text-white transition">Sí, Desactivar</button>
  </div>
</div>

</body>
</html>
