<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nombre Existente · CoffeeSoft</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', system-ui, sans-serif; background:rgba(0,0,0,.6); color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .card-demo { background:#1F2A37; border:1px solid rgba(55,65,81,.6); border-radius:12px; padding:1.5rem; }
</style>
</head>
<body>

<div class="card-demo w-[460px] max-w-[90vw]">
  <!-- Header -->
  <div class="flex items-start gap-3 mb-5">
    <div class="w-12 h-12 rounded-full bg-red-500/15 flex items-center justify-center flex-shrink-0">
      <svg class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
    </div>
    <div class="flex-1 pt-1">
      <h3 class="text-sm font-bold mb-1">Nombre no disponible</h3>
      <p class="text-[12px] text-gray-500">Ya existe una receta con este nombre en esta unidad de negocio.</p>
    </div>
  </div>

  <!-- Detalle -->
  <div class="bg-header rounded-lg p-3 mb-5 border border-gray-700" style="background:#141d2b;">
    <div class="flex items-center justify-between mb-2">
      <span class="text-[11px] text-gray-500">Nombre ingresado</span>
      <span class="text-[12px] font-medium text-red-400">Pasta Boloñesa</span>
    </div>
    <div class="flex items-center justify-between">
      <span class="text-[11px] text-gray-500">Unidad de Negocio</span>
      <span class="text-[12px] text-gray-300">Restaurante Centro</span>
    </div>
  </div>

  <!-- Sugerencia -->
  <div class="bg-blue-500/10 border border-blue-500/30 rounded-lg p-3 mb-5">
    <p class="text-[11px] text-blue-400 mb-1">? Sugerencia</p>
    <p class="text-[12px] text-gray-300">Prueba con: <span class="font-medium text-blue-400">Pasta Boloñesa Especial</span> o <span class="font-medium text-blue-400">Pasta Boloñesa V2</span></p>
  </div>

  <!-- Botones -->
  <div class="flex items-center justify-end gap-2">
    <button onclick="window.close()" class="px-4 py-2 rounded-lg bg-red-600 hover:bg-red-700 text-[12px] font-medium text-white transition">Cambiar Nombre</button>
  </div>
</div>

</body>
</html>
