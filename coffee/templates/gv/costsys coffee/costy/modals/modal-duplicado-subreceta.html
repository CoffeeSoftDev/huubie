<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subreceta Duplicada · CoffeeSoft</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', system-ui, sans-serif; background:rgba(0,0,0,.6); color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .card-demo { background:#1F2A37; border:1px solid rgba(55,65,81,.6); border-radius:12px; padding:1.5rem; }
</style>
</head>
<body>

<div class="card-demo w-[440px] max-w-[90vw]">
  <!-- Header -->
  <div class="flex items-start gap-3 mb-5">
    <div class="w-12 h-12 rounded-full bg-pink-500/15 flex items-center justify-center flex-shrink-0">
      <svg class="w-6 h-6 text-pink-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
    </div>
    <div class="flex-1 pt-1">
      <h3 class="text-sm font-bold mb-1">Subreceta duplicada</h3>
      <p class="text-[12px] text-gray-500">Esa subreceta ya se encuentra dentro de la receta, verifica por favor o elige otra subreceta.</p>
    </div>
  </div>

  <!-- Subreceta conflictiva -->
  <div class="bg-header rounded-lg p-3 mb-5 border border-gray-700 flex items-center gap-3" style="background:#141d2b;">
    <div class="w-9 h-9 rounded-lg bg-pink-500/15 flex items-center justify-center flex-shrink-0">
      <svg class="w-4 h-4 text-pink-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
    </div>
    <div>
      <p class="text-[12px] font-medium">Salsa Boloñesa Base</p>
      <p class="text-[10px] text-gray-500">Ya vinculada · 0.250 lt · $13.00</p>
    </div>
  </div>

  <!-- Botones -->
  <div class="flex items-center justify-end gap-2">
    <button onclick="window.close()" class="px-4 py-2 rounded-lg bg-pink-600 hover:bg-pink-700 text-[12px] font-medium text-white transition">Entendido</button>
  </div>
</div>

</body>
</html>
