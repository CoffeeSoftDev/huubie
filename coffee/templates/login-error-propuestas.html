<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propuesta - Error de login Huubie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
        .anim-in { animation: slideDown 0.28s ease-out; }
    </style>
</head>
<body class="bg-[#111928] min-h-screen p-8 text-white">

    <div class="max-w-md mx-auto">
        <header class="mb-6">
            <span class="text-[10px] uppercase tracking-wider text-gray-500 font-medium">Propuesta — Alerta institucional</span>
            <h1 class="text-base font-semibold mt-1">Error de contraseña Huubie</h1>
            <p class="text-gray-400 text-xs mt-1">Bloque horizontal con icono Lucide en mini-tile, título y subtítulo. Mismo lenguaje que el header "Bienvenido de regreso".</p>
        </header>

        <div class="bg-[#1F2A37] rounded-md p-6">
            <form class="text-white">
                <div class="flex flex-col">
                    <label class="text-sm font-medium">Email</label>
                    <input type="text" value="usuario@demo.com" class="mt-1 p-2 bg-[#374151] rounded-md outline-none text-white">
                </div>
                <div class="flex flex-col mt-4">
                    <label class="text-sm font-medium">Contraseña</label>
                    <div class="relative mt-1">
                        <input type="password" value="••••••••••" class="w-full p-2 pr-10 bg-[#374151] rounded-md outline-none text-white">
                        <button type="button" class="absolute inset-y-0 right-3 flex items-center text-gray-400">
                            <i data-lucide="eye" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>

                <!-- ERROR: Alerta institucional con icono Lucide -->
                <div class="mt-4 flex items-center gap-3 bg-[#2D1F2A] rounded-md p-2.5 anim-in">
                    <div class="flex items-center justify-center w-9 h-9 rounded bg-[#F87171]/15 shrink-0">
                        <i data-lucide="alert-circle" class="w-5 h-5 text-[#F87171]"></i>
                    </div>
                    <div class="flex flex-col leading-tight">
                        <span class="text-[#F87171] text-sm font-semibold">Contraseña incorrecta</span>
                        <span class="text-gray-400 text-[11px] mt-0.5">Verifica que tu correo y contraseña sean correctos.</span>
                    </div>
                </div>

                <button type="button" class="w-full mt-4 p-2 bg-[#1C64F2] hover:bg-[#0E9E6E] rounded-lg font-semibold transition-colors">
                    Iniciar Sesión
                </button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
