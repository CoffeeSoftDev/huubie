<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Huubie Coffee — Propuesta 2: Panel Ilustrado</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/ui-kit.css">
  <style>
    body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
    .gradient-sidebar {
      background: linear-gradient(145deg, #0f172a 0%, #141d2b 40%, #1a2332 100%);
    }
    .blob-1 {
      position: absolute; width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(28,100,242,0.12) 0%, transparent 70%);
      top: -80px; left: -80px; border-radius: 50%; pointer-events: none;
    }
    .blob-2 {
      position: absolute; width: 240px; height: 240px;
      background: radial-gradient(circle, rgba(124,58,237,0.10) 0%, transparent 70%);
      bottom: -60px; right: -60px; border-radius: 50%; pointer-events: none;
    }
  </style>
</head>
<body class="bg-[#111928] min-h-screen flex flex-col md:flex-row">

  <!-- Panel izquierdo: ilustracion + mensaje -->
  <div class="hidden md:flex md:w-1/2 gradient-sidebar relative items-center justify-center p-12 overflow-hidden border-r border-[#1a2332]">
    <div class="blob-1"></div>
    <div class="blob-2"></div>

    <div class="relative z-10 max-w-md text-center">
      <div class="w-20 h-20 bg-[#1C64F2]/15 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-[#1C64F2]/20">
        <svg class="w-10 h-10 text-[#1C64F2]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
          <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
          <line x1="6" y1="1" x2="6" y2="4"/>
          <line x1="10" y1="1" x2="10" y2="4"/>
          <line x1="14" y1="1" x2="14" y2="4"/>
        </svg>
      </div>
      <h2 class="text-2xl font-bold text-white mb-3">Gestiona tu negocio con Huubie</h2>
      <p class="text-gray-400 text-sm leading-relaxed">
        Controla pedidos, finanzas, inventario y recursos humanos desde un solo lugar.
        Diseñado para cafeterías y restaurantes modernos.
      </p>

      <div class="flex items-center justify-center gap-2 mt-8">
        <span class="w-2 h-2 rounded-full bg-[#1C64F2]"></span>
        <span class="w-2 h-2 rounded-full bg-gray-600"></span>
        <span class="w-2 h-2 rounded-full bg-gray-600"></span>
      </div>
    </div>
  </div>

  <!-- Panel derecho: formulario -->
  <div class="flex-1 flex flex-col items-center justify-center px-6 py-10 md:px-16 md:py-0">
    <div class="w-full max-w-[400px]">

      <!-- Header mobile -->
      <div class="md:hidden flex flex-col items-center mb-8">
        <div class="w-12 h-12 bg-[#1C64F2]/15 rounded-xl flex items-center justify-center mb-3">
          <svg class="w-6 h-6 text-[#1C64F2]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/></svg>
        </div>
        <h1 class="text-lg font-bold text-white">Huubie Coffee</h1>
      </div>

      <div class="mb-8">
        <h2 class="text-xl font-bold text-white">Inicia sesión</h2>
        <p class="text-sm text-gray-400 mt-1">Ingresa tus credenciales para continuar</p>
      </div>

      <form class="space-y-5">
        <div>
          <label class="block text-[11px] font-medium uppercase tracking-wider text-gray-500 mb-1.5">Usuario</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            </span>
            <input type="text" class="cs-input pl-10" placeholder="ej. luis.garcia" required>
          </div>
        </div>

        <div>
          <label class="block text-[11px] font-medium uppercase tracking-wider text-gray-500 mb-1.5">Contraseña</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            </span>
            <input type="password" class="cs-input pl-10 pr-10" placeholder="••••••••" required>
            <button type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-500 hover:text-gray-300 transition">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            </button>
          </div>
        </div>

        <div class="flex items-center justify-between text-sm">
          <label class="flex items-center gap-2 cursor-pointer text-gray-400 hover:text-gray-300 transition">
            <input type="checkbox" class="w-4 h-4 rounded border-gray-600 bg-[#1a2332] text-[#1C64F2] focus:ring-[#1C64F2]">
            Recuérdame
          </label>
          <a href="#" class="text-[#1C64F2] hover:text-[#76A9FA] transition text-xs font-medium">¿Olvidaste la contraseña?</a>
        </div>

        <button type="submit" class="cs-btn cs-btn-primary w-full py-2.5">
          Iniciar sesión
        </button>
      </form>

      <p class="text-center text-[11px] text-gray-500 mt-8">
        Huubie Coffee v1.0
      </p>
    </div>
  </div>

</body>
</html>
