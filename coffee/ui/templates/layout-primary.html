<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout Primario - UI Kit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/ui-kit.css">
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-[#111928] text-white">

  <!-- Shell de pagina -->
  <div id="mainContainer" class="w-full min-h-screen flex flex-col text-white mt-12 p-3 overflow-x-hidden">
    <div id="root" class="w-full max-w-full overflow-x-auto" style="background-color:#111828;">

      <!-- ==========================================
           LAYOUT CANONICO: primaryLayout
           Reglas:
           - class wrapper: 'flex mx-2 ' (sin p-2)
           - heightPreset: 'full'
           - card.filterBar.id: literal 'filterBar'
           - card.container: h-screen + overflow-auto
           ========================================== -->
      <div id="ModuloNombre" class="flex mx-2 h-[calc(100vh-120px)]">
        <div class="w-full flex flex-col">

          <!-- Filter bar (barra de filtros) -->
          <div id="filterBar" class="w-full my-3">
            <div id="filterBarModuloNombre" class="w-full my-3">
              <!-- Aqui se engancha createfilterBar() -->
              <div class="flex flex-wrap items-center gap-3">
                <select class="cs-select w-auto min-w-[160px]">
                  <option>Todos los estados</option>
                  <option>Activos</option>
                  <option>Inactivos</option>
                </select>
                <input type="text" class="cs-input w-auto min-w-[200px]" placeholder="Buscar...">
                <button class="cs-btn cs-btn-primary">
                  <i class="icon-plus"></i> Nuevo
                </button>
              </div>
            </div>
            <div id="containerHours"></div>
          </div>

          <!-- Contenedor principal -->
          <div id="containerModuloNombre"
               class="w-full my-2 bg-[#1F2A37] h-screen rounded-lg p-3 overflow-auto cs-scroll">
            <!-- Aqui se engancha la tabla, grid o contenido del modulo -->
            <p class="text-gray-400 text-sm">Contenido del modulo...</p>
          </div>

        </div>
      </div>

    </div>
  </div>

</body>
</html>
