<!-- ============================================================
     Componentes: Formularios (createModalForm / content_json_form)
     ============================================================ -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formularios - UI Kit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/ui-kit.css">
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-[#111928] text-white p-8">

  <div class="max-w-3xl mx-auto space-y-10">
    <h1 class="text-2xl font-bold mb-6">Formularios</h1>

    <!-- Formulario basico (inputs + selects) -->
    <section class="space-y-4">
      <h2 class="text-lg font-semibold text-gray-300">Formulario basico</h2>
      <div class="cs-card">
        <form class="space-y-4">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-[11px] font-medium uppercase tracking-wider text-gray-500 mb-1">Nombre</label>
              <input type="text" class="cs-input" placeholder="Ej. Juan Perez">
            </div>
            <div>
              <label class="block text-[11px] font-medium uppercase tracking-wider text-gray-500 mb-1">Correo electronico</label>
              <input type="email" class="cs-input" placeholder="Ej. juan@empresa.com">
            </div>
            <div>
              <label class="block text-[11px] font-medium uppercase tracking-wider text-gray-500 mb-1">Rol</label>
              <select class="cs-select">
                <option>Seleccionar...</option>
                <option>Administrador</option>
                <option>Vendedor</option>
                <option>Almacen</option>
              </select>
            </div>
            <div>
              <label class="block text-[11px] font-medium uppercase tracking-wider text-gray-500 mb-1">Telefono</label>
              <input type="tel" class="cs-input" placeholder="+52 55 1234 5678">
            </div>
          </div>

          <div>
            <label class="block text-[11px] font-medium uppercase tracking-wider text-gray-500 mb-1">Descripcion</label>
            <textarea class="cs-textarea" placeholder="Escribe una descripcion..."></textarea>
          </div>

          <div class="flex items-center gap-2">
            <input type="checkbox" id="chkActive" class="w-4 h-4 rounded border-gray-600 bg-[#1a2332] text-blue-600 focus:ring-blue-500">
            <label for="chkActive" class="text-sm text-gray-300">Usuario activo</label>
          </div>

          <div class="flex justify-end gap-3 pt-2">
            <button type="button" class="cs-btn cs-btn-outline">Cancelar</button>
            <button type="submit" class="cs-btn cs-btn-primary">Guardar</button>
          </div>
        </form>
      </div>
    </section>

    <!-- Input con icono (input-group) -->
    <section class="space-y-4">
      <h2 class="text-lg font-semibold text-gray-300">Input con icono</h2>
      <div class="cs-card">
        <div class="space-y-4">
          <div class="relative">
            <label class="block text-[11px] font-medium uppercase tracking-wider text-gray-500 mb-1">Buscar</label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              </span>
              <input type="text" class="cs-input pl-10" placeholder="Buscar por nombre, correo...">
            </div>
          </div>

          <div class="relative">
            <label class="block text-[11px] font-medium uppercase tracking-wider text-gray-500 mb-1">Password</label>
            <div class="relative">
              <input type="password" class="cs-input pr-10" placeholder="••••••••">
              <button type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-500 hover:text-gray-300">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Chips de seleccion multiple -->
    <section class="space-y-4">
      <h2 class="text-lg font-semibold text-gray-300">Chips de seleccion multiple</h2>
      <div class="cs-card">
        <label class="block text-[11px] font-medium uppercase tracking-wider text-gray-500 mb-2">Sucursales asignadas</label>
        <div class="flex flex-wrap gap-2">
          <span class="inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-medium bg-blue-500/15 text-blue-400 border border-blue-500/30">
            Sucursal Centro
            <button class="ml-1 hover:text-white"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
          </span>
          <span class="inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-medium bg-purple-500/15 text-purple-400 border border-purple-500/30">
            Sucursal Norte
            <button class="ml-1 hover:text-white"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
          </span>
          <button class="inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-medium bg-[#1a2332] text-gray-400 border border-gray-600 hover:border-gray-400 transition">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Agregar
          </button>
        </div>
      </div>
    </section>

  </div>

</body>
</html>
