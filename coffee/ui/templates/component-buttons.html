<!-- ============================================================
     Componentes: Botones (todos los variantes)
     ============================================================ -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Botones - UI Kit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/ui-kit.css">
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-[#111928] text-white p-8">

  <div class="max-w-4xl mx-auto space-y-8">
    <h1 class="text-2xl font-bold mb-6">Botones</h1>

    <!-- Variantes principales -->
    <section class="space-y-4">
      <h2 class="text-lg font-semibold text-gray-300">Variantes principales</h2>
      <div class="flex flex-wrap items-center gap-3 p-4 bg-[#1F2A37] rounded-lg">
        <button class="cs-btn cs-btn-primary">Primary</button>
        <button class="cs-btn cs-btn-secondary">Secondary</button>
        <button class="cs-btn cs-btn-success">Success</button>
        <button class="cs-btn cs-btn-danger">Danger</button>
        <button class="cs-btn cs-btn-outline">Outline</button>
        <button class="cs-btn cs-btn-ghost">Ghost</button>
      </div>
    </section>

    <!-- Con iconos (Fontello / Lucide) -->
    <section class="space-y-4">
      <h2 class="text-lg font-semibold text-gray-300">Con iconos</h2>
      <div class="flex flex-wrap items-center gap-3 p-4 bg-[#1F2A37] rounded-lg">
        <button class="cs-btn cs-btn-primary">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          Nuevo
        </button>
        <button class="cs-btn cs-btn-outline">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          Exportar
        </button>
        <button class="cs-btn cs-btn-danger">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
          Eliminar
        </button>
      </div>
    </section>

    <!-- Tamanos -->
    <section class="space-y-4">
      <h2 class="text-lg font-semibold text-gray-300">Tamanos</h2>
      <div class="flex flex-wrap items-center gap-3 p-4 bg-[#1F2A37] rounded-lg">
        <button class="cs-btn cs-btn-primary cs-btn-sm">Small</button>
        <button class="cs-btn cs-btn-primary">Default</button>
        <button class="cs-btn cs-btn-primary cs-btn-lg">Large</button>
      </div>
    </section>

    <!-- Estados -->
    <section class="space-y-4">
      <h2 class="text-lg font-semibold text-gray-300">Estados</h2>
      <div class="flex flex-wrap items-center gap-3 p-4 bg-[#1F2A37] rounded-lg">
        <button class="cs-btn cs-btn-primary" disabled>Deshabilitado</button>
        <button class="cs-btn cs-btn-ghost">Ghost hover</button>
      </div>
    </section>

    <!-- Acciones de tabla (icono solo) -->
    <section class="space-y-4">
      <h2 class="text-lg font-semibold text-gray-300">Acciones de tabla (icono)</h2>
      <div class="flex flex-wrap items-center gap-3 p-4 bg-[#1F2A37] rounded-lg">
        <button class="w-8 h-8 flex items-center justify-center rounded-md text-gray-400 hover:text-blue-400 hover:bg-[#1a2332] transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
        </button>
        <button class="w-8 h-8 flex items-center justify-center rounded-md text-gray-400 hover:text-red-400 hover:bg-[#1a2332] transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </button>
      </div>
    </section>

  </div>

</body>
</html>
