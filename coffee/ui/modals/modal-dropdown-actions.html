<!-- ============================================================
     Modal: Dropdown de acciones (createCoffeeTable3 dropdown)
     ============================================================ -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dropdown Acciones - UI Kit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/ui-kit.css">
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-[#111928] text-white p-8">

  <div class="max-w-3xl mx-auto space-y-10">
    <h1 class="text-2xl font-bold">Dropdown de Acciones</h1>

    <!-- Ejemplo en contexto de tabla -->
    <section class="space-y-4">
      <h2 class="text-lg font-semibold text-gray-300">En contexto de tabla</h2>
      <div class="overflow-x-auto rounded-lg border border-gray-700">
        <table class="cs-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Rol</th>
              <th class="text-right">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="font-mono text-sm">#001</td>
              <td class="font-medium">Juan Perez</td>
              <td>Administrador</td>
              <td class="text-right">
                <div class="relative inline-block">
                  <button class="w-8 h-8 inline-flex items-center justify-center rounded-md text-gray-400 hover:text-white hover:bg-[#1a2332] transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"/></svg>
                  </button>
                  <ul class="cs-dropdown-menu">
                    <li>
                      <a class="flex items-center gap-2">
                        <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                        Editar
                      </a>
                    </li>
                    <li>
                      <a class="flex items-center gap-2">
                        <svg class="w-4 h-4 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/></svg>
                        Desactivar
                      </a>
                    </li>
                    <li><hr class="border-gray-600 my-1"></li>
                    <li>
                      <a class="flex items-center gap-2 text-red-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        Eliminar
                      </a>
                    </li>
                  </ul>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- Dropdown aislado -->
    <section class="space-y-4">
      <h2 class="text-lg font-semibold text-gray-300">Dropdown aislado</h2>
      <div class="relative inline-block">
        <button class="cs-btn cs-btn-outline">
          Acciones
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <ul class="cs-dropdown-menu">
          <li><a></a></li>
          <li><a></a></li>
          <li><a></a></li>
        </ul>
      </div>
    </section>

  </div>

</body>
</html>
