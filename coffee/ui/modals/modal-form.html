<!-- ============================================================
     Modal: Formulario (createModalForm)
     ============================================================ -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Formulario - UI Kit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/ui-kit.css">
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-[#111928] text-white p-8">

  <!-- Demo: abrir modal al cargar -->
  <div class="cs-modal-backdrop"></div>

  <div class="cs-modal">
    <!-- Header -->
    <div class="cs-modal-header">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-blue-500/20 flex items-center justify-center">
          <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
        </div>
        <div>
          <h3 class="cs-modal-title">Nuevo Usuario</h3>
          <p class="text-sm text-gray-400">Completa los datos para dar de alta un nuevo usuario.</p>
        </div>
      </div>
      <button class="w-8 h-8 flex items-center justify-center rounded-md text-gray-400 hover:text-white hover:bg-[#1a2332] transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <!-- Body -->
    <div class="cs-modal-body">
      <form id="formModalUsuario" class="space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-[11px] font-medium uppercase tracking-wider text-gray-500 mb-1">Nombre completo *</label>
            <input type="text" class="cs-input" placeholder="Ej. Juan Perez">
          </div>
          <div>
            <label class="block text-[11px] font-medium uppercase tracking-wider text-gray-500 mb-1">Correo electronico *</label>
            <input type="email" class="cs-input" placeholder="Ej. juan@empresa.com">
          </div>
          <div>
            <label class="block text-[11px] font-medium uppercase tracking-wider text-gray-500 mb-1">Rol *</label>
            <select class="cs-select">
              <option>Seleccionar...</option>
              <option>Administrador</option>
              <option>Vendedor</option>
              <option>Almacen</option>
            </select>
          </div>
          <div>
            <label class="block text-[11px] font-medium uppercase tracking-wider text-gray-500 mb-1">Telefono</label>
            <input type="tel" class="cs-input" placeholder="+52 55 1234 5678">
          </div>
        </div>

        <div>
          <label class="block text-[11px] font-medium uppercase tracking-wider text-gray-500 mb-1">Sucursales asignadas</label>
          <div class="cs-input min-h-[48px] flex flex-wrap items-center gap-2 py-2">
            <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px] font-medium bg-blue-500/15 text-blue-400 border border-blue-500/30">
              Sucursal Centro
              <button class="ml-1 hover:text-white"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
            </span>
            <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px] font-medium bg-purple-500/15 text-purple-400 border border-purple-500/30">
              Sucursal Norte
              <button class="ml-1 hover:text-white"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
            </span>
          </div>
        </div>

        <div class="flex items-center gap-2">
          <input type="checkbox" id="chkActiveModal" class="w-4 h-4 rounded border-gray-600 bg-[#1a2332] text-blue-600 focus:ring-blue-500">
          <label for="chkActiveModal" class="text-sm text-gray-300">Usuario activo</label>
        </div>
      </form>
    </div>

    <!-- Footer -->
    <div class="cs-modal-footer">
      <button class="cs-btn cs-btn-outline">Cancelar</button>
      <button class="cs-btn cs-btn-primary">Guardar</button>
    </div>
  </div>

</body>
</html>
